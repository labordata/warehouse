# Fly.io configuration for warehouse-duckdb (the labordata.bunkum.us origin).
#
# Data-less image (Dockerfile): the .duckdb databases live on a Fly Volume
# mounted at /data and are updated out-of-band by refresh-data.yml.

app = "warehouse-duckdb"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# NB: no [mounts] block. A [mounts] here would make `flyctl deploy` create a
# second machine on a fresh empty volume, and the Fly proxy would round-robin
# between it and the real one (half of requests get no databases). Volumes are
# instead created and attached per-refresh by refresh-data.yml via
# `flyctl machine run --volume <id>:/data`.

[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    soft_limit = 60
    hard_limit = 100

  [[services.http_checks]]
    # /-/versions.json is constant-time and doesn't touch the databases.
    interval = "30s"
    # Datasette boot over 13 attached duckdb databases on shared-cpu-1x is
    # ~2 min (plugin discovery + 13 startup-hook add_database + 13
    # check_databases). Headroom past that so the health check doesn't
    # decide the machine is unhealthy mid-boot and kill it.
    grace_period = "240s"
    method = "get"
    path = "/-/versions.json"
    protocol = "http"
    timeout = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"
  cpus = 1
