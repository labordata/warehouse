# App-only deploy.
#
# Push the warehouse image to Fly. Data on the volume is untouched —
# the new container boots into whatever's already in /data.
#
# Triggers: every push to main (intended for code/plugin/config
# changes that land via PR merge) and manual dispatch. The
# `refresh-data.yml` workflow handles data updates; the two share a
# concurrency group so they serialize.

name: Deploy app

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: warehouse-deploy
  cancel-in-progress: false

# Public repo. GITHUB_TOKEN defaults to permissive on push events; lock
# it down so a compromised step can't write to issues/PRs/contents.
# Only `contents: read` is needed for actions/checkout.
permissions:
  contents: read

env:
  FLY_APP: warehouse

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        # Pinned to v1.6 commit SHA. `@master` would let an upstream
        # compromise run with our FLY_API_TOKEN. Bump intentionally.
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1  # v1.6

      - name: Build image
        id: build
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # `flyctl deploy` without --build-only reconciles the running
          # machines against fly.toml's services config, and when our
          # current machine doesn't look "deployed" enough to it (because
          # it was created out-of-band by refresh-data.yml, services
          # were added via `machine update --port`, etc.) it spins up
          # extra empty machines as siblings. That makes Fly proxy
          # round-robin to a data-less machine — outage. Build the
          # image only; we roll it out with `flyctl machine update`
          # below, which never creates machines.
          #
          # We pass GIT_SHA so the Dockerfile can bake it into
          # /etc/build-sha; the Verify step below SSHes into the
          # running machine and checks it matches $GITHUB_SHA. That's
          # how we detect Fly's control-plane tag→digest cache
          # serving a stale digest after machine update (the
          # long-running pain that was previously misdiagnosed as a
          # BuildKit / registry-layer-dedup issue and fought with
          # --no-cache — which was never the cure).
          TAG="build-$GITHUB_RUN_NUMBER"
          flyctl deploy --build-only --remote-only --app "$FLY_APP" \
            --image-label "$TAG" \
            --push \
            --build-arg "GIT_SHA=$GITHUB_SHA"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve pushed image digest
        id: digest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Pin the machine to the manifest digest, not the tag, so
          # Fly's control-plane tag→digest cache can't hand us back a
          # stale digest. (Fly staff confirm the cache on the forum:
          # https://community.fly.io/t/flyctl-machine-run-hitting-manifest-unknown-for-a-tag-that-exists-possible-control-plane-cache-issue/26246)
          #
          # Use `docker manifest inspect` because FLY_API_TOKEN is a
          # deploy token; raw HTTP Basic auth against
          # https://registry.fly.io/v2/.../manifests/TAG returns 404
          # for it (consistent with read-scope not being granted on
          # that path). Docker's standard auth-challenge → bearer
          # exchange does work.
          TAG="${{ steps.build.outputs.tag }}"
          echo "$FLY_API_TOKEN" | docker login registry.fly.io -u x --password-stdin
          DIGEST=""
          for i in $(seq 1 12); do
            DIGEST=$(docker manifest inspect --verbose \
                       "registry.fly.io/$FLY_APP:$TAG" 2>/dev/null \
                     | jq -r '.Descriptor.digest // ""')
            if [ -n "$DIGEST" ]; then
              break
            fi
            echo "retry $i: manifest not yet readable, sleeping 15s..." >&2
            sleep 15
          done
          if [ -z "$DIGEST" ]; then
            echo "could not resolve digest for $TAG after ~3 min" >&2
            exit 1
          fi
          echo "Resolved $TAG → $DIGEST"
          echo "image=registry.fly.io/$FLY_APP@$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Roll image onto the current machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Update only the role=current machine. Anything tagged
          # role=staging is in the middle of a refresh-data.yml run and
          # shouldn't be touched here.
          MID=$(flyctl machine list --app "$FLY_APP" --json | jq -r '
            [.[] | select(.config.metadata.role == "current")] | first | .id
          ')
          if [ -z "$MID" ] || [ "$MID" = "null" ]; then
            echo "No machine has role=current" >&2
            flyctl machine list --app "$FLY_APP" --json \
              | jq '.[]|{id,role:.config.metadata.role}' >&2
            exit 1
          fi
          echo "Rolling ${{ steps.digest.outputs.image }} onto $MID"
          flyctl machine update "$MID" --app "$FLY_APP" --yes \
            --image "${{ steps.digest.outputs.image }}"

      - name: Verify running rootfs matches commit
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Read /etc/build-sha from the actual running container
          # (baked in by the Dockerfile's ARG GIT_SHA). If it doesn't
          # match GITHUB_SHA, Fly handed us a different rootfs than
          # we asked for — fail loudly instead of declaring success.
          for i in 1 2 3 4 5; do
            RUNNING_SHA=$(flyctl ssh console --app "$FLY_APP" \
              -C "cat /etc/build-sha" 2>/dev/null \
              | tr -d '\r\n' | grep -Eo '[0-9a-f]{40}' | head -1) || RUNNING_SHA=""
            if [ -n "$RUNNING_SHA" ]; then
              break
            fi
            echo "retry $i: ssh/build-sha read failed, sleeping..." >&2
            sleep $((i * 5))
          done
          if [ "$RUNNING_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::Running rootfs SHA ($RUNNING_SHA) does not match GITHUB_SHA ($GITHUB_SHA)."
            echo "::error::Fly machine update reported success but the new image isn't actually running."
            exit 1
          fi
          echo "Verified: running rootfs SHA = $RUNNING_SHA"

      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          response=$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$response"
          echo "$response" | grep -q '"success":true' || { echo "Purge failed"; exit 1; }
