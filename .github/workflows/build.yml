name: Update Database

concurrency:
  group: database-build

on:
  schedule:
    - cron:  '11 05 * * *'
  workflow_dispatch:

jobs:
  build-crosswalk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install sqlite-utils csvs-to-sqlite labor-union-parser

      - name: Build union_names_crosswalk.db 
        run: make union_names_crosswalk.db

      - name: Zip databases
        run: zip crosswalk-databases.zip union_names_crosswalk.db f7.db nlrb.db lm20.db voluntary_recognitions.db

      - name: Upload databases
        uses: actions/upload-artifact@v4
        with:
          name: crosswalk-databases
          path: crosswalk-databases.zip

  build-and-deploy:
    needs: build-crosswalk
    permissions:
      contents: 'read'
      id-token: 'write'
      actions: write
    runs-on: ubuntu-latest

    env:
      IMAGE: gcr.io/labordata/datasette-warehouse

    steps:
      - uses: actions/checkout@v3

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/hostedtoolcache/CodeQL /usr/local/lib/android /opt/ghc
          df -h

      - id: 'auth'
        uses: 'google-github-actions/auth@v0'
        with:
            workload_identity_provider: 'projects/450850437809/locations/global/workloadIdentityPools/gh-pool/providers/gh-provider'
            service_account: 'github-deploy-labordata@labordata.iam.gserviceaccount.com'

      - name: Set up Cloud Run
        uses: google-github-actions/setup-gcloud@v0

      - name: Configure docker auth for gcr.io
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Download crosswalk databases
        uses: actions/download-artifact@v4
        with:
          name: crosswalk-databases

      - name: Unzip crosswalk databases
        run: |
          unzip crosswalk-databases.zip && rm crosswalk-databases.zip

      - name: dependencies
        run: pip install -r requirements.txt

      - name: get remaining databases
        run: make

      - name: Build Docker image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          datasette package *.db \
            -t $IMAGE:$GITHUB_RUN_NUMBER \
            -m warehouse_metadata.yml \
            -c datasette.yml \
            --plugins-dir=plugins/ \
            --extra-options="--crossdb --setting sql_time_limit_ms 100000 --cors --setting facet_time_limit_ms 500 --setting allow_facet off --setting trace_debug 1 --setting max_csv_mb 1000 --setting force_https_urls on" \
            --install=datasette-atom==0.10a0 \
            --install=datasette-rure \
            --install=pysqlite3-binary \
            --install=datasette-block-robots \
            --install=datasette-pretty-traces \
            --install=https://github.com/fgregg/datasette-schema-org/archive/refs/heads/main.zip \
            --version-note=$GITHUB_RUN_NUMBER
          docker tag $IMAGE:$GITHUB_RUN_NUMBER $IMAGE:latest

      - name: Free local artifacts before push
        run: |
          rm -f *.db
          df -h

      - name: Push Docker image
        run: |
          docker push $IMAGE:$GITHUB_RUN_NUMBER
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy warehouse \
            --image=$IMAGE:$GITHUB_RUN_NUMBER \
            --region=us-central1 \
            --project=labordata \
            --platform=managed \
            --memory=2Gi \
            --cpu=1 \
            --max-instances=2 \
            --set-env-vars=DATASETTE_SECRET=$(openssl rand -hex 32)

      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          response=$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$response"
          echo "$response" | grep -q '"success":true' || { echo "Purge failed"; exit 1; }

      - name: Warm cache from sitemap
        run: |
          curl -fsS https://labordata.bunkum.us/sitemap.xml \
            | grep -oE '<loc>[^<]+</loc>' \
            | sed 's|<loc>\(.*\)</loc>|\1|' \
            | xargs -P 10 -n 1 curl -fsS -o /dev/null

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
