# Fly.io deploy pipeline — parallel to the Cloud Run pipeline in build.yml.
#
# Two decoupled paths:
#   - code change: only "Deploy app to Fly" runs (fast, ~30s)
#   - data change: "Upload databases" + "Swap" run, code stays put
#
# For now, both run on every push to the fly-volumes branch and every
# scheduled run. Once we're confident, we'll merge to main and retire
# build.yml.

name: Fly Deploy

on:
  push:
    branches:
      - fly-volumes
  schedule:
    - cron: "0 7 * * *"  # daily, after the upstream data sources update
  workflow_dispatch:

env:
  FLY_APP: labordata-warehouse

jobs:
  build-crosswalk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build crosswalk databases
        run: |
          make union_names_crosswalk.db
      - name: Zip
        run: zip crosswalk-databases.zip union_names_crosswalk.db
      - uses: actions/upload-artifact@v4
        with:
          name: crosswalk-databases
          path: crosswalk-databases.zip

  deploy:
    needs: build-crosswalk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                       /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Install Python deps for the build
        run: pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: crosswalk-databases
      - run: unzip crosswalk-databases.zip && rm crosswalk-databases.zip

      - name: Build databases
        run: make

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # CODE path — push the data-less image. Cheap, fast.
      - name: Deploy app to Fly (image only, no DBs)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --remote-only --app "$FLY_APP" \
            --image-label "build-$GITHUB_RUN_NUMBER"

      # DATA path — upload .db files to the volume via SFTP, then swap in.
      - name: Upload databases to Fly volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Ensure incoming/ is empty
          flyctl ssh console --app "$FLY_APP" -C 'rm -rf /data/incoming && mkdir /data/incoming'

          # SFTP put each .db file. flyctl ssh sftp shell accepts a here-doc.
          (
            for db in *.db; do
              echo "put $db /data/incoming/$db"
            done
          ) | flyctl ssh sftp shell --app "$FLY_APP"

      - name: Swap databases atomically
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl ssh console --app "$FLY_APP" -C '/app/scripts/swap-data.sh'

      - name: Restart datasette
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Restart the machine so datasette re-mmaps the new .db files.
          flyctl machine restart --app "$FLY_APP"

      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          response=$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$response"
          echo "$response" | grep -q '"success":true' || { echo "Purge failed"; exit 1; }

      - name: Warm cache from sitemap
        run: |
          curl -fsS https://labordata.bunkum.us/sitemap.xml \
            | grep -oE '<loc>[^<]+</loc>' \
            | sed 's|<loc>\(.*\)</loc>|\1|' \
            | xargs -P 2 -n 1 curl -fsS -o /dev/null
