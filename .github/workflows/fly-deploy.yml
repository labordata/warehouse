# Fly.io deploy pipeline — parallel to the Cloud Run pipeline in build.yml.
#
# Order matters: data goes on the volume *before* the image redeploys. That
# way the new container boots with both the new .db files and the new
# inspect-data.json already in /data, and datasette starts up with
# --inspect-file pointing at a real, current file. If we deployed the image
# first, the post-deploy health check would hit cold mmap with no inspect
# data — and /-/databases.json would never return in time.
#
# Data transport: built .db files + inspect-data.json are pushed to an R2
# bucket from the runner (parallel multi-stream HTTPS, ~50-100 MB/s), then
# the Fly machine pulls them in-network (~118 MB/s observed) via urllib.
# No compression — gzip/gunzip on shared-cpu-1x decompressed at only ~9
# MB/s, which was slower than the transfer itself.
#
# Runs on every push to fly-volumes, on schedule, and on manual dispatch.
# Once we're confident, we'll merge to main and retire build.yml.

name: Fly Deploy

on:
  push:
    branches:
      - fly-volumes
  schedule:
    - cron: "0 7 * * *"  # daily, after upstream data sources update
  workflow_dispatch:

env:
  FLY_APP: warehouse
  R2_BUCKET: labordata-warehouse-staging
  R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}  # e.g. https://pub-XXXX.r2.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                       /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Install build dependencies
        run: |
          pip install -r requirements.txt
          pip install labor-union-parser

      - name: Build all databases
        run: make

      - name: Build inspect-data.json
        run: |
          # Pre-compute per-table row counts + schema hashes so datasette
          # doesn't have to do it at startup on every machine restart.
          datasette inspect *.db > inspect-data.json
          ls -lh inspect-data.json

      - name: Upload databases to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ secrets.R2_ENDPOINT }}  # https://<acct>.r2.cloudflarestorage.com
          AWS_DEFAULT_REGION: auto
        run: |
          # `aws s3 sync` does parallel multi-stream uploads and is
          # idempotent on retry. We restrict the include set to just the
          # files we care about so junk in the workspace doesn't leak.
          aws s3 sync . "s3://$R2_BUCKET/nightly/" \
            --exclude "*" \
            --include "*.db" \
            --include "inspect-data.json" \
            --no-progress

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure machine is running before pull
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Idempotent: starts the machine if it's stopped, no-op otherwise.
          flyctl machine list --app "$FLY_APP" --json \
            | jq -r '.[].id' \
            | xargs -I{} flyctl machine start {} --app "$FLY_APP" || true
          sleep 10

      - name: Pull databases from R2 to Fly volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Derive the asset list from inspect-data.json so we can't drift
          # between the inspect file and what the machine actually fetches.
          ASSETS=$(python -c "import json; print(' '.join(k+'.db' for k in json.load(open('inspect-data.json')).keys()))")
          ASSETS="$ASSETS inspect-data.json"
          echo "Pulling: $ASSETS"
          # Bootstrap the script onto the running container via SFTP — the
          # live image may predate /app/scripts/pull-from-r2.sh (we update
          # data before redeploying the image). Sourcing from /tmp keeps
          # this step independent of the image generation that's running.
          echo "put scripts/pull-from-r2.sh /tmp/pull-from-r2.sh" \
            | flyctl ssh sftp shell --app "$FLY_APP"
          flyctl ssh console --app "$FLY_APP" -C \
            "sh /tmp/pull-from-r2.sh $R2_PUBLIC_BASE/nightly $ASSETS"

      - name: Swap databases atomically
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Moves /data/incoming/*.db + inspect-data.json into /data/.
          # Old container keeps serving from FDs open on the now-unlinked
          # /data/previous/*.db until the next step restarts it.
          flyctl ssh console --app "$FLY_APP" -C '/app/scripts/swap-data.sh'

      # CODE path — image redeploy, which also restarts every machine and
      # picks up the freshly-swapped /data + inspect-data.json.
      - name: Deploy app to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --remote-only --app "$FLY_APP" \
            --image-label "build-$GITHUB_RUN_NUMBER"

      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          response=$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$response"
          echo "$response" | grep -q '"success":true' || { echo "Purge failed"; exit 1; }
