# Datasette config for the DuckDB deployment (app: warehouse-duckdb).
#
# Derived from datasette.yml — same canned queries, translated to DuckDB:
#   * datetime(col,'utc')||'Z'  ->  strftime(col,'%Y-%m-%dT%H:%M:%SZ')
#   * For columns we know are TIMESTAMP (e.g. nlrb.filing.created_at,
#     surveyed at the time of conversion), strftime takes the value directly.
#   * For columns whose underlying SQLite type was TEXT and that the converter
#     therefore left as VARCHAR (the lm20 receiveDate), use
#     strftime(try_cast(col as timestamp), '%Y-%m-%dT%H:%M:%SZ') so the format
#     works whether the underlying storage is TIMESTAMP or an ISO-shaped string.
#     (See issue #9 — once the converter promotes date-ish TEXT columns the
#     try_cast becomes a no-op and can come back out.)
#   * SQLite tolerates referencing SELECT aliases in WHERE. DuckDB follows the
#     standard and doesn't, so the lm20 query wraps in a CTE.
#   * `sqlite_sequence` table-hide tweak isn't needed — DuckDB has no such
#     table to hide.

extra_css_urls:
  - /static/custom.css?v=1

extra_js_urls:
  - /static/sticky-thead.js?v=4

plugins:
  datasette-duckdb:
    # Shared-instance mode: route every database through ONE process-wide DuckDB
    # instance (all dbs ATTACHed as catalogs, addressed per-cursor via USE)
    # instead of N independent per-db instances. This gives a SINGLE global
    # memory budget for the whole process (no per-instance oversubscription ->
    # the OOM #30) AND lets a single big operation (large CSV export / sort) use
    # the whole budget instead of being starved by a low per-instance cap (which
    # broke 500k-row CSV exports). See fgregg/datasette#31.
    shared_instance: true
    # The single global memory_limit (vs the old 128MB-per-instance cap). ~1.4GB
    # leaves headroom for base + python on the 2GB box.
    memory_limit: 1400MB
    # 1 vCPU: more threads only multiply sort/agg memory and worsen latency-
    # fairness (measured), with no compute gain.
    threads: 1
    # ROLLBACK: to revert to per-instance mode set `shared_instance: false` AND
    # `memory_limit: 128MB` together (a 1.4GB *per-instance* cap would OOM).
  datasette-block-robots:
    literal: |-
      User-agent: *
      Disallow: /*?
      Disallow: /*/sqlite_*
      Disallow: /*/_*
      Disallow: /*/*_fts
      Disallow: /*/*_fts_*

      User-agent: Claude-User
      Disallow:

      User-agent: ChatGPT-User
      Disallow:

      User-agent: Perplexity-User
      Disallow:

      Sitemap: https://labordata.bunkum.us/sitemap.xml
  schema-org:
    creator:
      "@type": Person
      "@id": https://orcid.org/0009-0001-8330-9219
      name: Forest Gregg
      url: https://bsky.app/profile/bunkum.us
    keywords:
      - labor
      - labor unions
      - United States
    defaults:
      spatialCoverage: United States
      isAccessibleForFree: true
      inLanguage: en
      license: https://creativecommons.org/publicdomain/mark/1.0/
    exclude:
      - cats
      - chips
      - union_names_crosswalk

databases:
  nlrb:
    queries:
      new_rc_cases:
        title: New petitions for representation elections
        sql: |-
          select
            case_number as atom_id,
            name as atom_title,
            strftime(created_at, '%Y-%m-%dT%H:%M:%SZ') as atom_updated,
            url as atom_link,
            printf(
              '<p>Case Number: <a href="%s">%s</a></p><p>Filed on: %s</p><p>%,d workers at %s petitioned for a representation election in %s, %s</p>',
              url,
              case_number,
              date_filed,
              number_of_voters_on_petition_or_charge,
              name,
              city,
              state
            ) as atom_content_html
          from
            filing
          where
            case_type = 'RC'
          order by
            created_at desc,
            date_filed desc
          limit
            100
  lm20:
    queries:
      new_lm20_filings:
        title: New LM20 Filings
        sql: |-
          select
            distinct rptID,
            printf(
              '%s vs %s',
              employer.empLabOrg,
              specific_subject_labor_orgs
            ) as atom_title,
            filing_url as atom_link,
            strftime(
              try_cast(receiveDate as timestamp),
              '%Y-%m-%dT%H:%M:%SZ'
            ) as atom_updated,
            printf(
              '<p>%s (%s, %s) hired %s to meet with %s to help convince workers not to organize with %s</p>',
              employer.empLabOrg,
              employer.city,
              employer.state,
              coalesce(contact.organization, contact.name),
              specific_subject_employees,
              specific_subject_labor_orgs
            ) as atom_content_html,
          from
            filing
            inner join employer using (rptId)
            inner join specific_activity using (rptId)
            inner join contact using (rptId)
          where
            contact_type = 'name_and_mailing_address'
            and atom_updated is not null
            and atom_title is not null
            and atom_content_html is not null
          order by
            receiveDate desc
          limit
            100
