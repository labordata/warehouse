  opdr:
    title: OLMS Online Public Disclosure Room — Annual LM-2/LM-3/LM-4 Data
    description_html: |-
      <p>Mirror of the <a href="https://olmsapps.dol.gov/olpdr/">DOL Office of Labor-Management Standards Online Public Disclosure Room</a>, covering the annual financial reports that unions file under <a href="https://www.law.cornell.edu/uscode/text/29/431">Section 201 of the Labor-Management Reporting and Disclosure Act</a> — LM-2 (large unions, ≥$250k receipts), LM-3 (medium), and LM-4 (small).</p>
      <p>Every union with private-sector or some public-sector members must file annually, reporting:</p>
      <ul>
        <li>Assets and liabilities (cash, investments, receivables, fixed assets, accounts payable, loans payable)</li>
        <li>Receipts (dues, fees, investment income, loans) and disbursements (officer/employee compensation, benefits, political activity, contributions, overhead, administrative expenses)</li>
        <li>Membership counts and dues rates</li>
        <li>Detailed itemized receipts and disbursements above OLMS thresholds — the largest tables here</li>
      </ul>
      <p>The schema is organized around the <a href="./opdr/lm_data">lm_data</a> table (one row per filing, keyed by <code>rpt_id</code>). Most other tables follow the convention <code>ar_&lt;category&gt;_&lt;subcategory&gt;</code> — "ar" for "annual report". Categorical fields foreign-key to <a href="./opdr/ar_erds_codes">ar_erds_codes</a>, a lookup table that expands the OLMS code numbers (account types, disbursement types, fiscal-year-end months, etc.).</p>
      <p>Roughly 600,000 filings cover 1999 through the present; the largest tables are <a href="./opdr/ar_disbursements_emp_off">ar_disbursements_emp_off</a> (~4.9M officer/employee compensation rows) and <a href="./opdr/ar_disbursements_genrl">ar_disbursements_genrl</a> (~3.1M general disbursement rows).</p>
    source: OLMS Online Public Disclosure Room
    source_url: https://github.com/labordata/opdr
    temporal_coverage: "1999/.."
    source_organization:
      "@type": GovernmentOrganization
      name: U.S. Department of Labor, Office of Labor-Management Standards
      url: https://www.dol.gov/agencies/olms
    keywords:
      - LM-2
      - LM-3
      - LM-4
      - union financial reports
      - LMRDA Section 201
      - OLMS
      - union disbursements
      - union officer compensation
      - dues and receipts
    tables:
      lm_data:
        description: One row per union annual financial report. The hub of the schema — all other tables reference lm_data via rpt_id. ~604,000 filings spanning 1999 to present. Includes union identification, the reporting period, summary totals (assets/liabilities/receipts/disbursements), and various yes/no indicators about filing characteristics.
        columns:
          rpt_id: OLMS report ID. Primary key.
          union_name: Reporting union's name as it appears on the filing.
          aff_abbr: Affiliate/parent organization abbreviation (e.g. "AFL-CIO", "SEIU").
          f_num: OLMS file number identifying the union.
          unit_name: Local or sub-unit name within the union.
          fye: Fiscal-year-end month (1–12). Foreign key to ar_erds_codes (code_type = "FYE_CODE").
          est_date: Date the union was established.
          term_date: Date the union terminated, if applicable.
          pd_covered_from: Start of the period covered by this filing (ISO 8601, YYYY-MM-DD).
          pd_covered_to: End of the period covered by this filing.
          register_date: Date OLMS registered the filing.
          amended: Whether this filing is an amendment.
          shortage: Whether the filing notes a financial shortage.
          maximum_bond: Maximum amount of the fidelity bond carried by the union.
          ttl_assets: Total assets reported (dollars).
          ttl_liabilities: Total liabilities reported (dollars).
          ttl_receipts: Total receipts reported (dollars).
          ttl_disbursements: Total disbursements reported (dollars).
          members: Total membership count reported.
          constitution_bylaw: Whether the union has a constitution and bylaws on file.
          terminate: Whether the union is being terminated.
          subsidiary: Whether the union has a subsidiary organization.
          desiq_pre: Designation prefix for the local (e.g. "Local", "Branch"). The "desiq" spelling (rather than "desig") is the column name as published by OLMS in their bulk-download column metadata, preserved as-is by the scraper.
          desig_num: Designation number (the local's number).
          desig_suf: Designation suffix.
          desig_name: Designation name.
          hardship: Whether the union claimed financial hardship.
          has_trust: Whether the union has trust funds.
          pac_funds: Whether the union has political action committee funds.
          outside_audit: Whether the financials were audited by an outside auditor.
          has_property_change: Whether there was a change in property.
          assets_pledged: Whether assets are pledged.
          contingent: Whether there are contingent liabilities.
          next_election: Date of the next scheduled officer election.
          has_liquidated_liabilities: Whether liquidated liabilities are reported.
          has_extended_loan_credit: Whether the union extended loan credit.
          has_liquidated_receivables: Whether liquidated receivables are reported.
          has_subsidiary: Whether the union has a subsidiary organization (duplicate of subsidiary; OLMS form has two related fields).
          num_attachments: Number of attachments to the filing.
          yr_covered: Calendar year that the reporting period falls within (typically equals the year of pd_covered_to).
          amendment: Amendment sequence number (0 for the original filing, 1 for the first amendment, etc.).
          receive_date: Date OLMS received the filing (timestamp with time component).
          adr_id: Address record ID within OLMS.
          address_type: Address-type code (FK to ar_erds_codes); in this snapshot all rows are 201 = mailing address.
          mail_firstname: First name on the union's mailing address.
          mail_lastname: Last name on the union's mailing address.
          build_num: Building number portion of the union's mailing address.
          street_adr: Street address (street name and number combined or just street name when build_num is set separately).
          city: City of the union's mailing address.
          state: Two-letter US Postal Service state abbreviation.
          zip: ZIP code of the union's mailing address.
          voice: Phone number of the union.
          mod_date: Timestamp of the last modification to this filing's OLMS record.
          mod_id: Numeric modification ID assigned by OLMS.
          record_kept: "Where the union's records are kept (\"T\" — at the union's address, \"F\" — at another address; blank when unspecified)."
          form_type: "Form variant filed — \"LM-2\" (large unions, ≥$250k receipts), \"LM-3\" (medium), \"LM-4\" (small), or \"LM-5\" (terminal report filed when the union dissolves)."
        units:
          maximum_bond: dollars
          ttl_assets: dollars
          ttl_liabilities: dollars
          ttl_receipts: dollars
          ttl_disbursements: dollars
          members: persons
      ar_erds_codes:
        description: Code lookup table. 93 rows. Other ar_ tables foreign-key here for categorical fields. Distinct code_type values include FYE_CODE (12 months), ASSET_CODE (5), DISBURSEMENT_CODE (7), EMP_OFF_CODE (4 officer/employee types), TAX_CODE (26 withholding categories), INVESTMENT_CODE (6), and more.
        columns:
          code: Numeric code. Primary key.
          code_type: Code category (e.g. "DISBURSEMENT_CODE", "FYE_CODE", "EMP_OFF_CODE").
          name: Short abbreviation for the code value.
          code_description: Human-readable description.
      ar_payer_payee:
        description: Master list of payers and payees referenced from itemized receipts and disbursements. ~2.2M rows. Each row is one named counterparty per filing — typically a vendor, contractor, employer (for dues check-off), or recipient organization. Referenced by ar_disbursements_genrl, ar_receipts_other, etc., via payer_payee_id.
        columns:
          payer_payee_id: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          name: Counterparty name.
          payer_payee_type: Code distinguishing payer from payee. FK to ar_erds_codes (PAYER_PAYEE_CODE).
          rcpt_disb_type: Code for the kind of receipt or disbursement this counterparty is associated with. FK to ar_erds_codes.
          type_or_class: Free-text classification of the counterparty.
          itemized: Itemized amount (dollars) associated with this counterparty.
          non_itemized: Non-itemized amount (under OLMS reporting threshold).
          total: Total amount (itemized + non_itemized).
          street: Street address.
          po_box: P.O. box.
          city: City.
          state: State.
          zip: ZIP code.
        units:
          itemized: dollars
          non_itemized: dollars
          total: dollars
      ar_assets_total:
        description: Summary balance-sheet asset totals at the start and end of the reporting period. One row per filing.
        columns:
          rpt_id: Foreign key to lm_data.rpt_id.
          cash_start: Cash on hand at period start.
          cash_end: Cash on hand at period end.
          accounts_receivable_start: Accounts receivable at period start.
          accounts_receivable_end: Accounts receivable at period end.
          investments_start: Investments at period start.
          investments_end: Investments at period end.
          fixed_assets_start: Fixed assets (real estate, equipment) at period start.
          fixed_assets_end: Fixed assets at period end.
          treasury_securities_start: U.S. Treasury securities at period start.
          treasury_securities_end: U.S. Treasury securities at period end.
          other_assets_start: Other assets at period start.
          other_assets_end: Other assets at period end.
          loans_receivable_start: Loans receivable at period start.
          loans_receivable_end: Loans receivable at period end.
          total_start: Total assets at period start.
          market_sec_total_cost: Total cost basis of marketable securities.
          market_sec_total_book_value: Total book value of marketable securities.
          other_inv_total_cost: Total cost basis of other investments.
          other_inv_total_book_value: Total book value of other investments.
      ar_assets_other:
        description: Itemized "other assets" detail. One row per other-asset entry per filing.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          description: Description of the other asset.
          book_value: Book value (dollars).
      ar_assets_accts_rcvbl:
        description: Accounts receivable detail — receivables by debtor name, including aging (past due 90/180 days) and write-offs.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          name: Debtor name.
          acct_type: Account type code. FK to ar_erds_codes (ACCT_CODE).
          past_due_90: Amount past due 90 days.
          past_due_180: Amount past due 180 days.
          liquidated: Amount liquidated during the period.
          total: Total receivable balance.
      ar_assets_fixed:
        description: Fixed-asset detail — real estate, vehicles, equipment owned by the union. Each row is one asset with cost basis, depreciation, and book value.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          asset_type: Asset category code. FK to ar_erds_codes (ASSET_CODE).
          description: Description of the fixed asset.
          cost_basis: Original cost (dollars).
          depreciation: Accumulated depreciation (dollars).
          book_value: Net book value (cost basis minus depreciation).
          value: Current market value (dollars), when reported.
      ar_assets_investments:
        description: Investment-asset detail — securities and other investments held by the union.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          inv_type: Investment category code. FK to ar_erds_codes (INVESTMENT_CODE).
          name: Name of the investment.
          amount: Amount invested (dollars).
      ar_assets_loans_rcvbl:
        description: Loans receivable detail — loans the union has made, by debtor.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          loan_type: Loan-type code. FK to ar_erds_codes (LOAN_CODE).
          name: Debtor name.
          purpose: Purpose of the loan.
          security: Security/collateral for the loan.
          terms: Loan terms (interest rate, maturity).
          outstanding_start_amt: Balance outstanding at period start.
          outstanding_end_amt: Balance outstanding at period end.
      ar_liabilities_total:
        description: Summary balance-sheet liability totals at start and end of the reporting period.
        columns:
          rpt_id: Foreign key to lm_data.rpt_id.
          accounts_payable_start: Accounts payable at period start.
          accounts_payable_end: Accounts payable at period end.
          loans_payable_start: Loans payable at period start.
          loans_payable_end: Loans payable at period end.
          mortgage_payable_start: Mortgages payable at period start.
          mortgage_payable_end: Mortgages payable at period end.
          other_liabilities_start: Other liabilities at period start.
          other_liabilities_end: Other liabilities at period end.
          total_start: Total liabilities at period start.
      ar_liabilities_other:
        description: Itemized "other liabilities" detail.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          description: Description of the liability.
          amount: Amount (dollars).
      ar_liabilities_loans_paybl:
        description: Loans payable detail — loans the union owes, by source.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          source: Lender name.
          loans_owed_start: Balance owed at period start.
          loans_obtained: New loans obtained during the period.
          cash_repayment: Cash repayments made during the period.
          non_cash_repayment: Non-cash repayments (write-offs, conversions).
          loans_owed_end: Balance owed at period end.
      ar_liabilities_accts_paybl:
        description: Accounts payable detail — by creditor name, including aging.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          acct_type: Account type code. FK to ar_erds_codes (ACCT_CODE).
          name: Creditor name.
          total: Total amount payable.
          past_due_90: Amount past due 90 days.
          past_due_180: Amount past due 180 days.
          liquidated: Amount liquidated during the period.
      ar_receipts_total:
        description: Summary receipts (income) totals by category for the reporting period.
        columns:
          rpt_id: Foreign key to lm_data.rpt_id.
          dues: Membership dues received.
          fees: Initiation and other fees.
          tax: Per-capita tax received from affiliates.
          investments: Investment income.
          interest: Interest income.
          dividends: Dividend income.
          rents: Rental income.
          loans_made: Loan principal received (from loans the union previously made).
          loans_obtained: New loans obtained.
          supplies: Income from sale of supplies.
          members: Receipts from members (other than dues).
          affiliates: Receipts from affiliated unions.
          other_receipts: Other receipts category.
          inv_sale_reinvestments: Proceeds from investment sales and reinvestments.
          all_other_receipts: Catch-all for other receipts.
      ar_receipts_other:
        description: Itemized non-dues receipts detail. Each row is one receipt over OLMS reporting thresholds.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          payer_payee_id: Foreign key to ar_payer_payee.payer_payee_id.
          receipt_type: Receipt-type code. FK to ar_erds_codes (RECEIPT_CODE).
          purpose: Purpose of the receipt.
          date: Date received (ISO 8601, YYYY-MM-DD).
          amount: Amount received (dollars).
      ar_receipts_inv_fa_sales:
        description: Receipts from investment and fixed-asset sales — line-item detail.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          description: Description of the asset sold.
          cost: Original cost of the asset.
          book_value: Book value at time of sale.
          gross_sales_price: Gross sales price.
          amount_recd: Amount actually received.
      ar_disbursements_total:
        description: Summary disbursement (spending) totals by category for the reporting period.
        columns:
          rpt_id: Foreign key to lm_data.rpt_id.
          representational: Representational activity (collective bargaining, contract administration).
          political: Political activity disbursements.
          contributions: Contributions, gifts, and grants.
          general_overhead: General overhead expenses.
          union_administration: Union administration costs.
          to_officers: Total disbursements to officers.
          to_employees: Total disbursements to employees.
          benefits: Benefit-plan contributions.
          per_capita_tax: Per-capita taxes paid to affiliates.
          strike_benefits: Strike benefits paid to members.
          supplies: Supplies for resale to members.
          fees: Professional and other fees paid.
          administration: Administrative expenses.
          direct_taxes: Direct taxes paid (other than payroll tax withholding).
          withheld: Taxes and dues withheld but not yet disbursed.
          withheld_not_disbursed: Withholdings not yet disbursed at period end.
          officer_deductions: Deductions from officer salaries.
          employee_deductions: Deductions from employee salaries.
          members: Disbursements to members.
          affiliates: Disbursements to affiliated unions.
          investments: Investment purchases.
          inv_purch_reinvestments: Investment purchases from reinvestment.
          loans_made: New loans made during the period.
          loans_payment: Repayments of loans the union owed.
          less_total_disbursed: Adjustment for total disbursed.
          other_disbursements: Other disbursements category.
          all_other_rep_activities: Representational subcategory catch-all.
          all_other_pol_activities: Political subcategory catch-all.
          all_other_contributions: Contributions subcategory catch-all.
          all_other_gen_overhead: General-overhead subcategory catch-all.
          all_other_union_admin: Union-admin subcategory catch-all.
          off_admin_expense: Officer/administrative expense.
          edu_pub_expense: Educational and publicity expense.
          pro_fees: Professional fees.
      ar_disbursements_emp_off:
        description: Officer and employee compensation detail — Schedule 11 (officers) and Schedule 12 (employees) on the LM-2 form. The largest table in the database at ~4.9M rows. One row per officer or employee per filing, with salary, allowances, official-business expenses, "other" disbursements, and a percentage breakdown of how their time was allocated across representational/political/contribution/general-overhead/administration activities.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          emp_off_type: Type of person (officer vs employee, etc.). FK to ar_erds_codes (EMP_OFF_CODE).
          first_name: First name.
          middle_name: Middle name.
          last_name: Last name.
          title: Job title.
          status_other_payer: Status of any other-payer (if the person was also paid by another employer during the period).
          gross_salary: Gross salary (dollars).
          allowances: Allowances paid (dollars).
          official_business: Official-business expenses paid (dollars).
          other_not_rptd: Other disbursements not reported elsewhere.
          total: Total disbursements to this person.
          rep_pct: Percentage of time allocated to representational activities.
          pol_pct: Percentage allocated to political activities.
          cont_pct: Percentage allocated to contributions, gifts, and grants.
          gen_ovrhd_pct: Percentage allocated to general overhead.
          admin_pct: Percentage allocated to union administration.
          item_num: Sequence number of the person within the filing.
        units:
          gross_salary: dollars
          allowances: dollars
          official_business: dollars
          other_not_rptd: dollars
          total: dollars
          rep_pct: percent
          pol_pct: percent
          cont_pct: percent
          gen_ovrhd_pct: percent
          admin_pct: percent
      ar_disbursements_genrl:
        description: General disbursement detail — Schedules 14–19 on the LM-2 form (representational activities, political activities, contributions, general overhead, union administration, and benefits-related disbursements). ~3.1M rows. Each row is one disbursement above OLMS itemization thresholds, with payee, purpose, date, and amount.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          disbursement_type: Disbursement-type code (which schedule the disbursement falls under). FK to ar_erds_codes (DISBURSEMENT_CODE).
          payer_payee_id: Foreign key to ar_payer_payee.payer_payee_id (the payee).
          purpose: Purpose of the disbursement.
          date: Date of the disbursement (ISO 8601, YYYY-MM-DD).
          amount: Amount paid (dollars).
        units:
          amount: dollars
      ar_disbursements_benefits:
        description: Benefit plan contributions detail — disbursements to pension funds, health plans, and other employee-benefit funds.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          description: Description of the benefit plan or contribution.
          paid_to: Name of the recipient organization.
          amount: Amount paid (dollars).
        units:
          amount: dollars
      ar_disbursements_inv_purchases:
        description: Investment purchase detail — securities and other investments acquired during the reporting period.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          description: Description of the investment.
          cost: Cost (dollars).
          book_value: Book value at acquisition.
          cash_paid: Cash actually paid (may differ from cost if other consideration was given).
      ar_membership:
        description: Membership counts by category (e.g. active, retired, agency-fee payers, life members). Each row is one membership category for one filing.
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          membership_type: Membership category code. FK to ar_erds_codes (MEMBERSHIP_CODE).
          category: Free-text category name.
          number: Member count for this category.
          voting_eligibility: Whether members in this category are eligible to vote in union elections.
        units:
          number: persons
      ar_rates_dues_fees:
        description: Dues and fee schedules — what the union charges members, broken out by rate type (regular dues, initiation fees, agency fees, working dues, etc.).
        columns:
          oid: Primary key.
          rpt_id: Foreign key to lm_data.rpt_id.
          rate_type: Rate-category code. FK to ar_erds_codes (RATE_CODE).
          amount: Rate amount (typically dollars per unit; stored as text because the source mixes flat dollar amounts and percent expressions).
          unit: Unit of the rate (e.g. "per month", "per year", "per hour").
          minimum: Minimum rate, when the rate has a range.
          maximum: Maximum rate, when the rate has a range.
  voluntary_recognitions:
    title: Voluntary Union Recognitions Known to the NLRB
    description_html: |-
      <p>Voluntary recognitions of unions by private-sector employers, as reported to the National Labor Relations Board. Under Section 9 of the National Labor Relations Act, employers may voluntarily recognize a union for collective bargaining without an election; when they do, they notify the NLRB using <a href="https://www.nlrb.gov/sites/default/files/attachments/pages/node-195/5581_7-20.pdf">Form NLRB-5581</a> and the agency posts a public notice during which other parties may challenge the recognition.</p>
      <p>Each row is a single recognition: the employer, the union, the bargaining unit (description and headcount), the NLRB regional office, and the relevant procedural dates (recognition, notice, posting, and any subsequent representation-case petition). The data was obtained from the NLRB via Freedom of Information Act requests and covers 2002 through 2024.</p>
    source: NLRB, Public Records Requests
    source_url: https://github.com/labordata/nlrb-voluntary-recognitions
    temporal_coverage: "2002/2024"
    source_organization:
      "@type": GovernmentOrganization
      name: National Labor Relations Board
      url: https://www.nlrb.gov/
    keywords:
      - voluntary recognition
      - card check
      - union recognition
      - NLRA Section 9
      - NLRB
      - bargaining units
    tables:
      voluntary_recognitions:
        description: One row per voluntary recognition reported to the NLRB on Form NLRB-5581. Includes the recognition event, the procedural notice/posting window, and a reference to any representation-case petition filed in response.
        columns:
          VR Case Number: NLRB-assigned identifier for the voluntary-recognition filing. Format is <region>-VR-<sequence>, e.g. "14-VR-017".
          Regional Office: NLRB regional office that received the Form NLRB-5581.
          Unit City: City where the bargaining unit is located. Often blank in earlier rows.
          Unit State: Two-letter US Postal Service abbreviation for the state of the bargaining unit. Often blank in earlier rows.
          Date VR Request Received: Date the NLRB received the voluntary-recognition request from the employer (ISO 8601, YYYY-MM-DD).
          Employer: Name of the employer extending recognition.
          Union: Full name of the union receiving recognition, typically including affiliates (e.g. "United Steelworkers", "St. Louis Newspaper Guild, Local 36047, TNG-CWA, AFL-CIO, CLC").
          Unit Description: Free-text description of the bargaining unit, generally listing job classifications included and excluded.
          Number of Employees: Headcount of the bargaining unit as reported on Form NLRB-5581. Often blank.
          Date of Voluntary Recogition: Date the employer formally recognized the union (ISO 8601, YYYY-MM-DD). Note the misspelling — preserved from the NLRB source data.
          Date VR Notice Sent: Date the NLRB sent the voluntary-recognition notice.
          Date Notice Posted: Date the NLRB notice was posted at the worksite, opening the window for challenges.
          Date Posting Closes: End of the posting window. After this date the recognition is final unless a representation-case petition has been filed.
          Date R Case Petition Filed (if any): Date a representation-case (election) petition was filed challenging the voluntary recognition, when applicable. Most rows are blank.
          R Case Number: NLRB case number for the representation case challenging the recognition, when applicable. Format <region>-RC-<sequence>.
          Notes: Free-text notes from the NLRB record.
          Case Filed Date: Date the NLRB administratively opened the case file.
        units:
          Number of Employees: persons
  work_stoppages:
    title: Work Stoppages Known to the FMCS
    description_html: |-
      <p>Strikes, lockouts, and other work stoppages in the United States that the Federal Mediation and Conciliation Service tracked in its case management system. Each row is a single stoppage with the employer, the union and local involved, the bargaining unit, location, industry (NAICS), number of workers idled, start and end dates, and duration in days.</p>
      <p>The FMCS stopped publishing this data at the end of 2020 and removed the archival files from its website. This database is built from the <a href="https://web.archive.org/web/20210105232710/https://www.fmcs.gov/resources/documents-and-data/">Internet Archive's copy of the FMCS pages</a>, with the date and numeric fields standardized.</p>
    source: FMCS website, archived by the Internet Archive
    source_url: https://github.com/labordata/fmcs-work-stoppage
    temporal_coverage: "1984/2020"
    source_organization:
      "@type": GovernmentOrganization
      name: Federal Mediation and Conciliation Service
      url: https://www.fmcs.gov/
    keywords:
      - work stoppages
      - strikes
      - lockouts
      - labor disputes
      - FMCS
      - collective bargaining
    tables:
      work_stoppages:
        description: One row per work stoppage. Earliest stoppages are from 1984; the series ends in 2020 when FMCS discontinued publication. Most rows are strikes; a smaller share are lockouts and other stoppages tracked by FMCS field staff.
        columns:
          Employer: Name of the establishment where the work stoppage occurred.
          Union: Short name or abbreviation of the union involved (for example, "NABET", "GCIU", "UFCW").
          Union Local: Local number of the union (an integer string).
          Case Number: FMCS case identifier for the stoppage. Format varies across years.
          BU: Bargaining-unit identifier assigned by FMCS, when known.
          NAICS: 6-digit North American Industry Classification System code for the employer's industry.
          Industry: Human-readable industry sector corresponding to the NAICS code (e.g. "Manufacturing", "Construction", "Information").
          "City, State": Location of the work stoppage as a single string in the form "City, ST" (city name followed by the two-letter US Postal Service state abbreviation).
          "# Idled": Number of workers idled by the stoppage, as reported to or estimated by FMCS.
          Start Date: First day of the stoppage (ISO 8601, YYYY-MM-DD).
          End Date: Last day of the stoppage, inclusive (ISO 8601, YYYY-MM-DD).
          Duration: Length of the stoppage in days, typically computed from Start Date and End Date.
        units:
          "# Idled": persons
          Duration: days
  farber:
    title: 1972-1991 NLRB election data due to Henry Farber
    description_html: |-
      <p><a href="https://en.wikipedia.org/wiki/Henry_Farber">Henry Farber</a> got the earliest files on 9-track tape from the NLRB and then updated the data with subsequent FOIA requests. Farber and his co-authors used these data in "Accounting for the Decline of Unions in the Private Sector, 1973-1998" (2001), <a href="https://dataspace.princeton.edu/handle/88435/dsp01j098zb111">"Ronald Reagan and the Politics of Declining Union Organization</a> (2002), and <a href="https://www.nber.org/papers/w19908">"Union Organizing Decisions in a Deteriorating Environment: The Composition of Representation Elections and the Decline in Turnout"</a> (2014).</p>    
  whisard:
    title: Wage and Hour Compliance Action Data
    description_html: |-
      <p>The DOL Wage and Hour Division's "WHISARD" (Wage-Hour Investigative Support and Reporting Database) — every closed WHD investigation. Each case names the employer, the location and industry, and the workers affected; the matched <a href="./whisard/violations">violations</a> table lists each statute violated with counts, back wages owed, and civil money penalties.</p>
      <p>WHD enforces a wide range of federal labor laws: the Fair Labor Standards Act (minimum wage, overtime, child labor, recordkeeping); the Family and Medical Leave Act; the Davis-Bacon Act and Service Contract Act (prevailing-wage rules on federal contracts); the Migrant and Seasonal Agricultural Worker Protection Act; H-1B, H-2A, and H-2B visa worker protections; the Employee Polygraph Protection Act; and others. The <code>type</code> column on the violations table identifies which statute was violated.</p>
      <p>The data is scraped from the <a href="https://enforcedata.dol.gov/views/data_summary.php">DOL Enforcement Data Catalog</a>. WHD refreshes their dataset roughly quarterly; the scraper checks for updates daily and re-imports when WHD publishes a new snapshot.</p>
    source: Department of Labor Enforcement Data Catalog, scraped
    source_url: https://github.com/labordata/whd-compliance
    temporal_coverage: "1985/.."
    source_organization:
      "@type": GovernmentOrganization
      name: U.S. Department of Labor, Wage and Hour Division
      url: https://www.dol.gov/agencies/whd
    keywords:
      - wage theft
      - back wages
      - FLSA
      - minimum wage
      - overtime
      - prevailing wage
      - Davis-Bacon
      - WHD
      - labor enforcement
      - civil money penalties
    tables:
      cases:
        description: One row per closed WHD investigation. ~365,000 cases since 1985. Each row identifies the employer (trade and legal name, address, NAICS industry), the count of violations found, the civil money penalty assessed, back wages agreed to be paid (and the number of employees due those back wages), and the investigation date range. Note that a small number of rows have nonsense dates (year 0200 or 3021) reflecting upstream data-entry errors.
        columns:
          case_id: WHD case identifier. Primary key.
          trade_nm: Employer's trade name (DBA).
          legal_name: Employer's legal entity name.
          street_addr_1_txt: Street address of the cited establishment.
          cty_nm: City of the establishment.
          st_cd: Two-letter US Postal Service state abbreviation.
          zip_cd: ZIP code of the establishment.
          naic_cd: 6-digit NAICS code for the employer's industry.
          naics_code_description: Human-readable industry description corresponding to the NAICS code.
          case_violtn_cnt: Total count of violations cited in this case (sum across all statutes).
          cmp_assd: Civil money penalty assessed against the employer, in dollars.
          ee_violtd_cnt: Count of employees who were the subject of violations.
          bw_atp_amt: Back wages "agreed to pay" — the amount of unpaid wages WHD calculated and the employer agreed to remit, in dollars.
          ee_atp_cnt: Count of employees due back wages under the agreed-to-pay amount.
          findings_start_date: Beginning of the investigation period covered by the findings.
          findings_end_date: End of the investigation period.
          flsa_repeat_violator: "FLSA repeat-violator flag — \"R\" (repeat violator), \"W\" (willful violator), \"RW\" (both), or \"N/A\" (neither)."
          load_dt: Timestamp when this row was loaded into the scraper's database.
        units:
          case_violtn_cnt: violations
          ee_violtd_cnt: persons
          cmp_assd: dollars
          bw_atp_amt: dollars
          ee_atp_cnt: persons
      violations:
        description: One row per violation type per case — the per-statute breakdown of each investigation's findings. About 542,000 rows. The type column identifies the specific federal labor law violated; the most common are FLSA (general Fair Labor Standards Act), flsa_ot (overtime specifically), flsa_mw (minimum wage), fmla (Family and Medical Leave Act), and dbra (Davis-Bacon Act).
        columns:
          id: Primary key.
          case_id: Foreign key to cases.case_id.
          type: "Statute violated — \"flsa\" (Fair Labor Standards Act, general), \"flsa_ot\" (FLSA overtime), \"flsa_mw\" (FLSA minimum wage), \"flsa_cl\" (FLSA child labor), \"flsa_smw14\" (FLSA student/learner Section 14 minimum wage), \"fmla\" (Family and Medical Leave Act), \"dbra\" (Davis-Bacon Act, prevailing wage on federal construction), \"sca\" (Service Contract Act, prevailing wage on federal service contracts), \"cwhssa\" (Contract Work Hours and Safety Standards Act), \"mspa\" (Migrant and Seasonal Agricultural Worker Protection Act), \"h1b\" / \"h2a\" / \"h2b\" (visa program violations), \"osha\" (OSHA-related findings), or \"eppa\" (Employee Polygraph Protection Act)."
          violations: Number of violations cited under this statute for this case.
          back_wages: Back wages owed under this statute, in dollars.
          employees: Number of employees affected under this statute.
          civil_money_penalty: Civil money penalty assessed under this statute, in dollars.
        units:
          violations: violations
          back_wages: dollars
          employees: persons
          civil_money_penalty: dollars
      flsa_details:
        description: Placeholder table for additional FLSA-violation detail. Currently empty in the snapshot — the upstream WHD export doesn't always populate this. The schema is included for forward-compatibility with future WHD releases.
        columns:
          violation_id: Foreign key to violations.id.
          type: Sub-classification of the FLSA violation.
          back_wages: Back wages owed under this detail row, in dollars.
        units:
          back_wages: dollars
  lm20:
    title: Filings for Activity of Labor Relations Consultants (Anti-union consultants)
    description_html: |-
      <p>Reports filed with the Department of Labor by "persuaders" — labor-relations consultants whom employers hire to dissuade workers from joining or supporting a union. Under <a href="https://www.law.cornell.edu/uscode/text/29/433">Section 203 of the Labor-Management Reporting and Disclosure Act</a>, persuaders must file two forms with the DOL Office of Labor-Management Standards:</p>
      <ul>
        <li><a href="https://www.dol.gov/agencies/olms/sites/dolgov/files/migrated/regs/compliance/forms-instructions/LM-20.pdf">LM-20 (Agreement and Activities Report)</a> — within 30 days after entering into an agreement to perform persuader activities. Names the employer that hired them, the agreement terms, the people who will do the work, and the specific activities planned.</li>
        <li><a href="https://www.dol.gov/agencies/olms/sites/dolgov/files/migrated/regs/compliance/forms-instructions/LM-21.pdf">LM-21 (Receipts and Disbursements Report)</a> — annually, reporting the persuader's receipts from clients and how the money was spent.</li>
      </ul>
      <p>The data is scraped nightly from the OLMS <a href="https://olms.dol-esa.gov/olpdr/">Online Public Disclosure Room</a>. Filings are organized around a central <a href="./lm20/filing">filing</a> table keyed by <code>rptId</code>; related tables describe the employer that hired the persuader, the people performing the work, the specific activities described, and (for LM-21s) the persuader's financials.</p>
    source: OLMS website, scraped
    source_url: https://github.com/labordata/lm20
    temporal_coverage: "2001/.."
    source_organization:
      "@type": GovernmentOrganization
      name: U.S. Department of Labor, Office of Labor-Management Standards
      url: https://www.dol.gov/agencies/olms
    keywords:
      - persuaders
      - LM-20
      - LM-21
      - anti-union consultants
      - union avoidance
      - labor relations consultants
      - LMRDA Section 203
      - OLMS
    tables:
      filer:
        label_column: companyName
        description: One row per filing entity (the persuader firm or individual). 778 rows. Identified by OLMS's surrogate filer id (srNum).
        columns:
          srNum: OLMS surrogate filer ID. Primary key.
          companyName: Persuader's filing name.
          companyCity: City of the filer's reported address.
          companyState: State of the filer's reported address.
          srFilerId: OLMS filer-system identifier (string form).
      filing:
        description: One row per LM-20 or LM-21 filing. About 10,346 LM-20s and 1,257 LM-21s. Keyed by rptId.
        columns:
          rptId: OLMS report ID. Primary key.
          formFiled: "Form type — \"LM-20\" or \"LM-21\"."
          srNum: Foreign key to filer.srNum (the persuader who filed).
          srFilerId: OLMS filer-system identifier (denormalized from filer).
          empLabOrg: Employer or labor organization named on the filing (denormalized from employer).
          address1: Filer's mailing address line 1.
          address2: Filer's mailing address line 2.
          city: Filer's city.
          state: Filer's state.
          zip: Filer's ZIP code.
          amended: "Whether the filing is an amendment to a prior report (\"Yes\"/\"No\")."
          amendment: Sequence number of the amendment, when applicable.
          originalRptId: rptId of the original filing that this report amends, when applicable.
          beginDate: For LM-21, start of the reporting period (the persuader's fiscal year start).
          endDate: For LM-21, end of the reporting period.
          yrCovered: Year covered by the report.
          receiveDate: Date OLMS received the filing (ISO 8601, YYYY-MM-DD).
          registerDate: Date OLMS registered the filing in its system.
          paperOrElect: "Whether the filing was submitted on paper or electronically (\"Paper\"/\"Electronic\")."
          repOrgsCnt: Number of reporting organizations on the filing.
          filing_url: URL to the filing on the OLMS public disclosure site.
          file_path: Local path to the cached file in the scraper's storage layout.
          file_checksum: Checksum of the cached file (for change detection).
          file_status: Scraper status indicator for the file fetch.
      contact:
        description: Contact persons named in filings — the filer's representatives. Two contact_type values are used; see column docs.
        columns:
          rptId: Foreign key to filing.rptId.
          contact_type: "Role of the contact — \"name_and_mailing_address\" (primary contact for the filing) or \"any_other_name_or_address_necessary_to_verify_report\" (alternate address)."
          name: Contact person's name.
          title: Contact person's title.
          organization: Organization the contact is associated with.
          street: Street address.
          "po_box,_bldg,_room_no,_if_any": P.O. box, building, or room number, when applicable.
          city: City.
          state: State.
          zip_code: ZIP code.
          ein: Employer Identification Number, when reported.
      employer:
        description: Employers that hired the persuader. Each LM-20 names the employer that contracted for persuader services; sometimes more than one employer per filing (~13k rows across ~10k LM-20 filings).
        columns:
          rptId: Foreign key to filing.rptId.
          empLabOrg: Employer name.
          empTrdName: Employer trade name (DBA), when different from the legal name.
          city: Employer's city.
          state: Employer's state.
          termDate: Date the agreement with the persuader was terminated, when applicable.
          amount: Amount paid to the persuader under this agreement.
      lm20:
        description: LM-20-specific fields — the persuader agreement details. One row per LM-20 filing (3,337 rows). Keyed by rptId.
        columns:
          rptId: Foreign key to filing.rptId.
          amended: Amendment flag (numeric).
          date_fiscal_year_ends: End date of the persuader's fiscal year.
          date_entered_into: Date the agreement with the employer was entered into.
          direct: Description of direct persuader activities planned.
          indirect: Description of indirect persuader activities planned.
          written_agreement: "Whether there is a written agreement (\"Yes\"/\"No\")."
          notes: Free-text notes from the filing.
          type_of_person: "Persuader's legal form — \"Corporation C\", \"Individual\", \"Partnership\", or \"Other\"."
          name: Persuader name as listed on the LM-20.
          organization: Persuader's organization.
          ein: Employer Identification Number.
          street: Street address.
          "po_box,_bldg,_room_no,_if_any": P.O. box, building, or room number.
          city: City.
          state: State.
          zip_code: ZIP code.
      lm21:
        description: LM-21-specific fields — the annual receipts and disbursements report (Schedule lines + summary totals). 379 rows. Column names preserve the verbatim formatting from the source export, including some leading-space and abbreviated column names.
        columns:
          rptId: Foreign key to filing.rptId.
          period_begin: Beginning of the reporting period.
          period_through: End of the reporting period.
          fees_for_professional_services: Item 8 — Fees for professional services.
          loans_made: Item 9 — Loans made.
          publicity: Item 10 — Publicity expenses.
          other_disbursements: Item 11 — Other disbursements.
          officer_and_administrative_expenses: Item 12 — Officer and administrative expenses.
          total_disbursements_to_officers_and_employees: Item 13 — Total disbursements to officers and employees.
          "total_disbursements_(sum_of_items_8-13)": Total disbursements summed across items 8–13.
          total_disbursements: Grand total of all disbursements reported.
          " Employer Name": Employer client name. (Column name has a leading space, preserved from the source export.)
          " Trade Name, If any": Employer trade name. (Stored as INTEGER affinity but typically holds text; quirk of the source schema.)
          Amount: Amount received from the client.
          Purpose: Purpose of the receipt or disbursement.
          Name: Officer or employee name (Schedule 13 disbursement listing).
          Title: Officer or employee title.
          Organization: Organization name.
          City: City.
          Street: Street.
          "P.O. B, B, Room N, if any": P.O. box, building, or room number. (Column name truncated in the source export.)
          ZIP code: ZIP code.
      performer:
        description: Individuals or organizations who will perform the persuader activities described on the LM-20. Linked back to a specific_activity via specific_activity_id when the form ties performers to specific listed activities.
        columns:
          rptId: Foreign key to filing.rptId.
          specific_activity_id: Foreign key to specific_activity.id, linking this performer to one of the listed activities.
          performer_order: Sequential order of the performer as listed on the form.
          name: Performer's name.
          title: Performer's title.
          organization: Performer's organization.
          street: Street address.
          "po_box,_bldg,_room_no,_if_any": P.O. box, building, or room number.
          city: City.
          state: State.
          zip: ZIP code.
          ein: Employer Identification Number, when reported.
      specific_activity:
        description: Specific persuader activities described on LM-20s. Each activity row has its own id and groups performers, the target workforce, and the affected union(s).
        columns:
          id: Primary key for the activity.
          rptId: Foreign key to filing.rptId.
          activity_order: Sequence number of this activity within the filing.
          specific_nature_of_activity: Description of the persuader activity (e.g. captive-audience meetings, one-on-one supervisor training, mailings).
          specific_period_of_performance: Time window during which the activity is to be performed.
          specific_extent_of_performance: Extent or volume of the activity (e.g. number of meetings, duration).
          specific_subject_employees: The workers the activity is directed at.
          specific_subject_labor_orgs: The unions the activity is directed against.
      receipts:
        description: Receipts (income) reported on LM-21 filings, listing what each client paid the persuader.
        columns:
          rptId: Foreign key to filing.rptId.
          receipt_number: Sequential number of the receipt entry on the filing.
          employer: Client employer that made the payment.
          trade_name: Client trade name (DBA), when different.
          amount: Dollar amount received.
          type_of_payment: "Form of payment (e.g. \"Cash\", \"Check\")."
          "non-cash_payment": Description of any non-cash payment.
          termination_date: Date the agreement with this client was terminated, when applicable.
          name: Contact name at the client.
          title: Contact title.
          street: Street address.
          mailing_address: Mailing address (sometimes captured as integer in the source).
          "po_box,_bldg,_room_no,_if_any": P.O. box, building, or room number.
          city: City.
          state: State.
          zip_code: ZIP code.
      signatures:
        description: Signature blocks on each filing — typically two signers per filing (president and treasurer).
        columns:
          rptId: Foreign key to filing.rptId.
          signature_number: Sequence number (1, 2) of the signature block.
          signed: Name of the signer.
          title: Signer's title.
          date: Date signed (ISO 8601, YYYY-MM-DD).
          telephone: Phone number indicator (numeric form).
          telephone_number: Phone number as a string.
      attachment:
        description: Supplementary files attached to filings.
        columns:
          attachment_id: Primary key.
          rptId: Foreign key to filing.rptId.
          filename: Filename of the attachment.
          file_description: Free-text description of the attachment.
          file_urls: URL(s) to download the attachment from OLMS.
      individual_disbursements:
        description: Individual disbursement records from LM-21 Schedule 13 — payments to specific officers and employees of the persuader firm during the reporting period.
        columns:
          rptId: Foreign key to filing.rptId.
          disbursement_order: Sequence number within the filing.
          name: Officer or employee name.
          salary: Salary component of the disbursement.
          expense: Expense-reimbursement component.
          total: Total disbursement to the named person.
  lm10:
    title: Filings for Employers who hire Labor Relation Consultants or Pay Labor Officials
    description_html: |-
      <p>Annual reports filed by employers under <a href="https://www.law.cornell.edu/uscode/text/29/433">Section 203(a) of the Labor-Management Reporting and Disclosure Act</a>, disclosing financial dealings that bear on labor relations:</p>
      <ul>
        <li><strong>8.a</strong> — Payments to a labor organization or its officers/agents</li>
        <li><strong>8.b</strong> — Payments to employees to persuade other employees about organizing or bargaining</li>
        <li><strong>8.c</strong> — Expenditures meant to interfere with, restrain, or coerce employees in their organizing rights</li>
        <li><strong>8.d</strong> — Expenditures to gather information on employees' or unions' activities in a labor dispute</li>
        <li><strong>8.e</strong> — Agreements with labor-relations consultants for anti-union persuasion activities (the employer-side counterpart to the consultant's <a href="./lm20">LM-20</a> filing)</li>
        <li><strong>8.f</strong> — Agreements with consultants for information-gathering on labor activities</li>
      </ul>
      <p>Form <a href="https://www.dol.gov/agencies/olms/sites/dolgov/files/migrated/regs/compliance/forms-instructions/LM-10.pdf">LM-10</a> is filed by the <em>employer</em>; the matched <a href="./lm20">LM-20</a> is filed by the consultant. Joining the two via the employer name and approximate dates is the standard analytical workflow.</p>
      <p>The data is scraped nightly from the OLMS <a href="https://olms.dol-esa.gov/olpdr/">Online Public Disclosure Room</a>. Organized around a central <a href="./lm10/filing">filing</a> table keyed by <code>rptId</code>; activities are in <a href="./lm10/activity">activity</a> keyed by <code>id</code> with counterparty, contact, and expenditure detail in joined tables.</p>
    source: OLMS website, scraped
    source_url: https://github.com/labordata/lm10
    temporal_coverage: "2001/.."
    source_organization:
      "@type": GovernmentOrganization
      name: U.S. Department of Labor, Office of Labor-Management Standards
      url: https://www.dol.gov/agencies/olms
    keywords:
      - LM-10
      - employer reporting
      - persuader agreements
      - LMRDA Section 203
      - OLMS
      - anti-union expenditures
      - labor relations consultants
    tables:
      filer:
        label_column: companyName
        description: One row per employer that files LM-10s. 5,879 rows. Identified by OLMS surrogate filer id (srNum).
        columns:
          srNum: OLMS surrogate filer ID. Primary key.
          srFilerId: OLMS filer-system identifier (string form).
          filerType: Filer type as classified by OLMS.
          companyName: Employer's filing name.
          companyCity: City of the filer's reported address.
          companyState: State of the filer's reported address.
      filing:
        description: One row per LM-10 filing. 14,548 rows. Keyed by rptId. Each filing covers a fiscal year and may disclose multiple reportable activities.
        columns:
          rptId: OLMS report ID. Primary key.
          formFiled: "Form type — always \"LM-10\" in this database."
          formLink: URL to the form on the OLMS public disclosure site.
          srNum: Foreign key to filer.srNum.
          srFilerId: OLMS filer-system identifier (denormalized from filer).
          oID: Organization identifier within OLMS.
          empLabOrg: Employer name (denormalized).
          empTrdName: Employer trade name (DBA), when different.
          subLabOrg1: Subsidiary or affiliated organization, slot 1.
          subLabOrg2: Subsidiary or affiliated organization, slot 2.
          address1: Filer's mailing address line 1.
          address2: Filer's mailing address line 2.
          city: Filer's city.
          state: Filer's state.
          zip: Filer's ZIP code.
          amended: "Whether the filing is an amendment to a prior report (\"Yes\"/\"No\")."
          amendment: Sequence number of the amendment, when applicable.
          beginDate: Start of the reporting period covered by this filing.
          endDate: End of the reporting period.
          yrCovered: Year covered by the report.
          receiveDate: Date OLMS received the filing (ISO 8601, YYYY-MM-DD).
          registerDate: Date OLMS registered the filing in its system.
          promiseDate: Date a future filing is promised, when applicable.
          paperOrElect: "Whether the filing was submitted on paper or electronically (\"Paper\"/\"Electronic\")."
          repOrgsCnt: Number of reporting organizations on the filing.
          filing_url: URL to the filing on the OLMS public disclosure site.
          file_path: Local path to the cached file in the scraper's storage layout.
          file_checksum: Checksum of the cached file (for change detection).
          file_status: Scraper status indicator for the file fetch.
      lm10:
        description: LM-10 form-specific fields. One row per filing (2,752 rows). Mostly covers the reporting period and metadata about where the underlying records are kept.
        columns:
          rptId: Foreign key to filing.rptId.
          file_number: OLMS internal file number.
          formFiled: Form type (denormalized).
          period_begin: Beginning of the fiscal-year reporting period.
          period_through: End of the reporting period.
          type_of_organization: "Filer's legal form — \"Corporation\", \"Partnership\", \"Individual\", or \"Other\"."
          records_hosted_with_reporting_employer: "Whether the underlying activity records are kept at the reporting employer's address (\"Yes\"/\"No\")."
          records_hosted_with_principal_officer: Whether records are kept at the principal officer's address.
          records_hosted_at_other_address: Whether records are kept at a third address (see other_address table).
      reporting_employer:
        description: Address and contact details for the reporting employer, as listed on the LM-10. One row per filing.
        columns:
          rptId: Foreign key to filing.rptId.
          employer: Employer name.
          trade_name: Employer trade name (DBA).
          attention_to: Attention-to line for mail.
          title: Title of the contact person.
          street: Street address.
          "po_box,_bldg,_room_no,_if_any": P.O. box, building, or room number, when applicable.
          city: City.
          state: State.
          "zip_code_+_4": ZIP+4 code.
      activity:
        description: Reportable activities — one row per individual payment, agreement, or expenditure the employer must disclose. ~14,500 rows across ~14,500 filings. Each activity is classified by activity_code (which question on the form, 8.a-f) and activity_type (Payment, Agreement, or Both).
        columns:
          id: Primary key for the activity.
          rptId: Foreign key to filing.rptId.
          activity_code: Form item the activity falls under — "ITEM 8.a." (payments to unions/officials), "ITEM 8.e." (consultant agreements), "ITEM 8.b./c./d./f." for the less-common categories.
          activity_type: "\"Payment\", \"Agreement\", or \"Both\"."
          date_of_agreement: Date the agreement was entered into, when applicable.
          form_agreement: "Whether there is a written agreement (\"Yes\"/\"No\")."
          counterparty_position: Job position of the counterparty (e.g. union officer's title).
          explanation: Free-text explanation of the activity.
          federal_work: Whether the work is federally funded or contracted (relevant to the federal-work flag added in later form versions).
          uei: Unique Entity Identifier (federal contractor ID), when applicable.
          no_uei_checkbox: Indicator that no UEI applies.
          agencies: Federal agencies involved, when reporting federal-work activity.
          unlisted_agencies: Free-text list of agencies not in the standard dropdown.
          12b_exists: "Indicator (1/0) for whether the Item 12.b. block applies (additional information continuation)."
      reportable_activity:
        description: One row per Form Item 8.a–8.f question per filing, recording the employer's yes/no answer and (when "Yes") the count of detailed activity rows reported in the activity table. ~16,500 rows.
        columns:
          rptId: Foreign key to filing.rptId.
          code: Question code — "8.a" through "8.f".
          question: Full text of the question on the form.
          answer: "Employer's answer — \"Yes\" or \"No\"."
          n_responses: Number of detailed activity rows the employer reported for this question.
      counterparty_organization:
        description: The organization on the other side of each reportable activity — a union, a consultant firm, or another employer. One row per activity.
        columns:
          activity_id: Foreign key to activity.id.
          organization: Counterparty organization name.
          street: Street address.
          "po_box,_bldg,_room_no,_if_any": P.O. box, building, or room number.
          city: City.
          state: State.
          "zip_code_+_4": ZIP+4 code.
      counterparty_contact:
        description: Contact person at the counterparty organization for each activity.
        columns:
          activity_id: Foreign key to activity.id.
          name: Contact person's name.
          street: Street address.
          "po_box,_bldg,_room_no,_if_any": P.O. box, building, or room number.
          city: City.
          state: State.
          "zip_code_+_4": ZIP+4 code.
      expenditure:
        description: Individual expenditure rows under each activity — the line-by-line payments. ~39,400 rows. The kind field is free-text and not normalized ("Check", "check", "Payment by check", "Cash", "Travel Savings", "Meal" / "Meals", etc.).
        columns:
          activity_id: Foreign key to activity.id.
          date: Date of the expenditure (ISO 8601, YYYY-MM-DD).
          amount: Dollar amount of the expenditure.
          kind: Type of payment as free text — not normalized. Common values include "Check", "Cash", "Credit Card", "Meal"/"Meals", "Travel Savings", "Expense Reimbursement (Cash)", "Payment by check".
      principal_officer:
        description: Principal officer of the reporting employer — the person responsible for the filing's accuracy.
        columns:
          rptId: Foreign key to filing.rptId.
          name: Principal officer's name.
          street: Street address.
          "po_box,_bldg,_room_no,_if_any": P.O. box, building, or room number.
          city: City.
          state: State.
          "zip_code_+_4": ZIP+4 code.
      signature:
        description: Signature blocks on each LM-10 — typically two signers (president and treasurer).
        columns:
          rptId: Foreign key to filing.rptId.
          signed: Name of the signer.
          title: Signer's title.
          on_date: Date signed.
          telephone_number: Phone number.
      organization:
        description: Subsidiary and affiliated organizations of the reporting employer. ~33,500 rows — many filings list multiple related corporate entities.
        columns:
          rptId: Foreign key to filing.rptId.
          oID: Organization identifier within OLMS.
          empLabOrg: Organization name.
          city: City.
          state: State.
          promiseDate: Date a future filing for this organization is promised, when applicable.
      other_address:
        description: Third-party address where the underlying activity records are kept (used when lm10.records_hosted_at_other_address is "Yes").
        columns:
          rptId: Foreign key to filing.rptId.
          name: Name of the records custodian.
          title: Title of the custodian.
          organization: Organization holding the records.
          street: Street address.
          "po_box,_bldg,_room_no,_if_any": P.O. box, building, or room number.
          city: City.
          state: State.
          "zip_code_+_4": ZIP+4 code.
  osha_enforcement:
    title: OSHA Enforcement Data (inspections, citations, accidents)
    description_html: |-
      <p>Every OSHA inspection on record — over 5 million since 1970 — with associated citations, penalties, and accident investigations. Sourced from the federal Occupational Safety and Health Administration's "Integrated Management Information System" (IMIS), the system that captures every enforcement action by federal OSHA offices and the 28 state-plan OSHA programs.</p>
      <p>The data is built around two parallel record types:</p>
      <ul>
        <li><b>Inspection records</b> (the <a href="./osha_enforcement/inspection">inspection</a> table) describe each workplace inspection: the employer, the site, the industry (SIC and NAICS), the inspection's trigger (planned, complaint, accident, referral, etc.), the scope, and union status. Cited <a href="./osha_enforcement/violation">violations</a> link back via <code>activity_nr</code>, each carrying the standard cited, gravity, current penalty, initial penalty, and contest/final-order dates. Penalty histories are tracked in <a href="./osha_enforcement/violation_event">violation_event</a>; general-duty-clause citation text lives in <a href="./osha_enforcement/violation_gen_duty_std">violation_gen_duty_std</a>.</li>
        <li><b>Accident investigations</b> (the <a href="./osha_enforcement/accident">accident</a> table) describe workplace accidents reported under OSHA's Form 170, with narrative <a href="./osha_enforcement/accident_abstract">abstracts</a> and per-victim <a href="./osha_enforcement/accident_injury">injury</a> details (age, sex, nature of injury, degree, body part, source). Many lookup tables (event_type, body_part, injury, occupation, etc.) carry the human-readable values for the coded fields on accident_injury.</li>
      </ul>
      <p>The data is downloaded nightly from <a href="https://enforcedata.dol.gov/">DOL's Enforcement Data Catalog</a> (the same upstream source as the WHISARD data); processing scripts live at <a href="https://github.com/labordata/osha-enforcement">labordata/osha-enforcement</a>.</p>
    source: DOL Enforcement Data Catalog, processed
    source_url: https://github.com/labordata/osha-enforcement
    temporal_coverage: "1970/.."
    source_organization:
      "@type": GovernmentOrganization
      name: U.S. Department of Labor, Occupational Safety and Health Administration
      url: https://www.osha.gov/
    keywords:
      - OSHA
      - workplace safety
      - workplace health
      - occupational injury
      - workplace fatality
      - safety citation
      - workplace inspection
      - workplace accident
      - labor enforcement
    tables:
      inspection:
        description: One row per OSHA inspection, ~5.2 million since 1970. Each row identifies the employer (estab_name, site address, NAICS/SIC industry), the inspection trigger (insp_type — accident, complaint, planned, referral, etc.), scope, union status, and the dates the case was opened/modified/closed. Joins to violation, related_activity, optional_info, and strategic_codes via activity_nr.
        columns:
          activity_nr: Unique inspection identifier. Primary key.
          reporting_id: OSHA office or organizational unit responsible for the inspection.
          state_flag: Indicates the inspection was performed by a state-plan OSHA program rather than federal OSHA. NULL or 1.
          estab_name: Employer name (may have inconsistent spellings across rows for the same employer).
          site_address: Street address of the inspected site.
          site_city: City of the inspected site.
          site_state: Two-letter state code of the inspected site.
          site_zip: ZIP code of the inspected site.
          owner_type: Code for ownership type (private, federal government, state/local government, etc.).
          owner_code: Numeric owner code, paired with owner_type.
          adv_notice: Whether advance notice of the inspection was given.
          safety_hlth: "Inspection focus — \"S\" (safety) or \"H\" (health)."
          sic_code: 4-digit Standard Industrial Classification code (1987 manual). NULL for inspections coded only with NAICS.
          naics_code: 6-digit North American Industry Classification System code.
          insp_type: Code for the impetus that triggered the inspection (planned schedule, accident, complaint, referral, follow-up, etc.).
          insp_scope: Code for inspection scope — complete, partial, records-only, or no inspection.
          why_no_insp: If insp_scope indicates no inspection took place, this code explains why.
          union_status: Code indicating whether the workforce at the site was union-represented at the time of inspection.
          safety_manuf: "Safety inspection covered manufacturing industries — \"X\" or NULL."
          safety_const: "Safety inspection covered construction — \"X\" or NULL."
          safety_marit: "Safety inspection covered maritime — \"X\" or NULL."
          health_manuf: "Health inspection covered manufacturing — \"X\" or NULL."
          health_const: "Health inspection covered construction — \"X\" or NULL."
          health_marit: "Health inspection covered maritime — \"X\" or NULL."
          migrant: "Flag indicating the inspection involved migrant or seasonal workers — \"X\" or NULL."
          mail_street: Employer's mailing address — street.
          mail_city: Mailing address city.
          mail_state: Mailing address state.
          mail_zip: Mailing address ZIP.
          host_est_key: Cross-reference key for inspections at the same establishment (when multiple inspections at one site share an establishment ID).
          nr_in_estab: Number of employees at the establishment at the time of inspection.
          open_date: Date the inspection was opened (started).
          case_mod_date: Date the case was last modified.
          close_conf_date: Date of the closing conference with the employer.
          close_case_date: Date the case was administratively closed.
          ld_dt: Timestamp when this row was loaded into the scraper's database.
        units:
          nr_in_estab: persons
      violation:
        description: One row per OSHA standard cited on an inspection, ~13.2 million rows. Joins to inspection via activity_nr. Each row carries the cited standard, citation type (serious/willful/repeat/etc.), gravity, the current and initial penalty amounts, and the dates the violation was issued, contested, and reached final order. Failure-to-abate ("fta_*") columns track penalties added for not correcting earlier violations.
        columns:
          activity_nr: Foreign key to inspection.activity_nr.
          citation_id: Citation identifier within the inspection (one inspection can have many citations).
          delete_flag: Flag indicating the citation was deleted or superseded.
          standard: OSHA standard cited (e.g., "19260451" for scaffold standard 29 CFR 1926.451).
          viol_type: "Violation type — \"S\" (serious), \"W\" (willful), \"R\" (repeat), \"O\" (other-than-serious), \"U\" (unclassified), \"FTA\" (failure to abate), etc."
          issuance_date: Date the citation was issued.
          abate_date: Date by which the employer was required to abate the violation.
          abate_complete: Date abatement was verified, or status code.
          current_penalty: Current penalty amount in dollars (post-settlement, after reductions or increases).
          initial_penalty: Initial penalty proposed when the citation was issued, in dollars.
          contest_date: Date the employer formally contested the citation, if applicable.
          final_order_date: Date the citation became a final order.
          nr_instances: Number of instances of the violation cited.
          nr_exposed: Number of employees exposed to the cited hazard.
          rec: Recordkeeping flag.
          gravity: Gravity-based penalty severity, an integer rating used by OSHA penalty-calculation guidelines.
          emphasis: Whether the inspection was part of an emphasis program (NEP/SEP).
          hazcat: Hazard category code.
          fta_insp_nr: Inspection number of the prior inspection on which the failure-to-abate is based.
          fta_issuance_date: Issuance date of the failure-to-abate citation.
          fta_penalty: Failure-to-abate penalty amount in dollars.
          fta_contest_date: Contest date for the failure-to-abate citation.
          fta_final_order_date: Final-order date for the failure-to-abate citation.
          hazsub1: First hazardous-substance code associated with the violation.
          hazsub2: Second hazardous-substance code.
          hazsub3: Third hazardous-substance code.
          hazsub4: Fourth hazardous-substance code.
          hazsub5: Fifth hazardous-substance code.
          load_dt: Timestamp when this row was loaded.
        units:
          current_penalty: dollars
          initial_penalty: dollars
          fta_penalty: dollars
          nr_instances: instances
          nr_exposed: persons
      violation_event:
        description: History of changes to a violation's penalty, abatement date, or status — ~11.6 million rows. Each row records a settlement, contest, modification, or other event that altered an earlier-issued violation. Useful for tracking how proposed penalties shrink through the appeals and settlement process.
        columns:
          activity_nr: Foreign key to violation.activity_nr.
          citation_id: Foreign key to violation.citation_id.
          pen_fta: Flag distinguishing penalty events from failure-to-abate events.
          hist_event: Type of event (settlement, contest, modification, etc.).
          hist_date: Date of the event.
          hist_penalty: Penalty amount after this event, in dollars.
          hist_abate_date: New abatement date set by this event, if applicable.
          hist_vtype: New violation type after this event.
          hist_insp_nr: Related inspection number.
          load_dt: Timestamp when this row was loaded.
        units:
          hist_penalty: dollars
      violation_gen_duty_std:
        description: Text of "general duty clause" citations — violations issued under Section 5(a)(1) of the OSH Act, which OSHA uses when no specific standard fits. Each row is one line of the citation narrative. ~2.2 million rows. Join to violation via activity_nr + citation_id.
        columns:
          activity_nr: Foreign key to violation.activity_nr.
          citation_id: Foreign key to violation.citation_id.
          line_nr: Line number within the citation narrative.
          line_text: One line of the citation's general-duty-clause narrative text.
          load_dt: Timestamp when this row was loaded.
      accident:
        description: One row per accident investigated by OSHA — ~165,000 since 1972. Sourced from OSHA Form 170 (Accident Investigation). Each row identifies the event date, a short event description (event_desc), and (for construction accidents) the project type, end-use, cost bracket, and number of stories. Joins to accident_abstract for the narrative text and accident_injury for per-victim details.
        columns:
          summary_nr: Accident summary number. Primary key.
          report_id: OSHA reporting unit that handled the investigation.
          event_date: Date of the accident.
          event_time: Time of the accident, encoded as HHMM (e.g., 1430 for 2:30pm).
          event_desc: Short text description of what happened.
          event_keyword: Keyword classifying the accident type.
          const_end_use: For construction accidents, the end use of the construction project (FK to end_use).
          build_stories: For accidents at building sites, number of stories of the building.
          nonbuild_ht: For accidents at non-building sites, height in feet.
          project_cost: For construction accidents, cost bracket of the project (FK to cost).
          project_type: For construction accidents, type of project (FK to project_type).
          sic_list: SIC codes applicable to the site (comma-separated).
          fatality: Flag indicating the accident resulted in at least one fatality.
          state_flag: Indicates the accident was investigated by a state-plan OSHA program.
          abstract_text: Indicates whether an abstract is available in accident_abstract.
          load_dt: Timestamp when this row was loaded.
      accident_abstract:
        description: Narrative descriptions of accidents — one row per line per accident, ~1.15 million rows. Join to accident via summary_nr. Useful for full-text search; the narratives describe the circumstances of the accident in plain prose.
        columns:
          summary_nr: Foreign key to accident.summary_nr.
          line_nr: Line number within the abstract.
          abstract_text: One line of the accident narrative.
          load_dt: Timestamp when this row was loaded.
      accident_injury:
        description: One row per injured person per accident — ~232,000 rows. Identifies the victim's age and sex, the nature and degree of the injury, the body part affected, the source of the injury, the human/environmental contributing factors, and (for falls) the fall height and distance. Joins to accident via the rel_insp_nr field (which is the inspection number, FK to inspection.activity_nr) and to the lookup tables for the coded fields.
        columns:
          summary_nr: Foreign key to accident.summary_nr.
          rel_insp_nr: Foreign key to inspection.activity_nr — the inspection associated with this injury.
          age: Age of the injured person.
          sex: "Sex of the injured person — \"M\", \"F\", or unknown."
          nature_of_inj: Nature-of-injury code (FK to injury).
          part_of_body: Body-part-affected code (FK to body_part).
          src_of_injury: Source-of-injury code (FK to injury_source).
          event_type: Event-type code (FK to event_type).
          evn_factor: Environmental-factor code (FK to environmental).
          hum_factor: Human-factor code (FK to human).
          occ_code: Occupation code (FK to occupation).
          degree_of_inj: Degree-of-injury code (FK to degree_injury — fatal, hospitalized, non-hospitalized, etc.).
          task_assigned: Task-assigned code (FK to task — what the worker was assigned to do).
          hazsub: Hazardous-substance code, if a substance was involved.
          const_op: Construction operation code, if applicable (FK to operator).
          const_op_cause: Construction operation cause code (FK to operator).
          fat_cause: For fatalities, the cause code (FK to fatality).
          fall_distance: For falls, distance fallen in feet.
          fall_ht: For falls, height of the fall in feet.
          injury_line_nr: Line number within the accident's injury list.
          load_dt: Timestamp when this row was loaded.
        units:
          age: years
          fall_distance: feet
          fall_ht: feet
      optional_info:
        description: Generic key/value extension data on inspections — ~1.7 million rows. OSHA uses this table to capture inspection details that didn't fit the structured columns of the inspection table. Join via activity_nr.
        columns:
          activity_nr: Foreign key to inspection.activity_nr.
          opt_type: Type identifier for the extension data.
          opt_id: Identifier within the type.
          opt_value: Value of the optional field.
          opt_info_id: Sub-identifier.
          load_dt: Timestamp when this row was loaded.
      related_activity:
        description: Links inspections to other related inspections — ~2.5 million rows. Used when one inspection triggers another (e.g., a follow-up, referral, or related-establishment inspection). Join the parent via activity_nr; rel_act_nr identifies the related inspection.
        columns:
          activity_nr: Foreign key to inspection.activity_nr (the parent inspection).
          rel_type: Type of relationship (follow-up, referral, related-establishment, etc.).
          rel_act_nr: Activity number of the related inspection.
          rel_safety: "Whether the related inspection covered safety — \"X\" or NULL."
          rel_health: "Whether the related inspection covered health — \"X\" or NULL."
          load_dt: Timestamp when this row was loaded.
      strategic_codes:
        description: Emphasis-program codes attached to inspections — ~2.9 million rows. OSHA targets inspections through National Emphasis Programs (NEPs) and Local Emphasis Programs (LEPs). Each row tags an inspection with one such program. Join via activity_nr.
        columns:
          activity_nr: Foreign key to inspection.activity_nr.
          prog_type: Program-type identifier (e.g., NEP, LEP, SEP).
          prog_value: Specific program code or name (e.g., the NEP for amputations, trenching, combustible dust).
          load_dt: Timestamp when this row was loaded.
      event_type:
        description: Lookup table for accident_injury.event_type — the kind of event that caused the injury (struck by object, fall from elevation, caught in machinery, etc.). One row per code.
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key (referenced by accident_injury.event_type).
          accident_value: Human-readable event description.
          accident_letter: Sub-letter within the code group.
          load_dt: Timestamp when this row was loaded.
      fatality:
        description: Lookup table for accident_injury.fat_cause — the cause of death in fatal accidents.
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key (referenced by accident_injury.fat_cause).
          accident_value: Human-readable cause-of-death description.
          accident_letter: Sub-letter within the code group.
          load_dt: Timestamp when this row was loaded.
      operator:
        description: Lookup table for accident_injury.const_op and const_op_cause — the construction operation being performed when the injury occurred (e.g., trenching, welding, scaffold erection).
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key (referenced by accident_injury.const_op / const_op_cause).
          accident_value: Human-readable operation description.
          accident_letter: Sub-letter within the code group.
          load_dt: Timestamp when this row was loaded.
      environmental:
        description: Lookup table for accident_injury.evn_factor — environmental contributing factors (e.g., poor lighting, weather conditions, slippery surfaces).
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key (referenced by accident_injury.evn_factor).
          accident_value: Human-readable environmental-factor description.
          accident_letter: Sub-letter within the code group.
          load_dt: Timestamp when this row was loaded.
      human:
        description: Lookup table for accident_injury.hum_factor — human contributing factors (e.g., lack of training, fatigue, failure to use PPE).
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key (referenced by accident_injury.hum_factor).
          accident_value: Human-readable human-factor description.
          accident_letter: Sub-letter within the code group.
          load_dt: Timestamp when this row was loaded.
      injury:
        description: Lookup table for accident_injury.nature_of_inj — the nature of the injury (e.g., fracture, laceration, amputation, burn).
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key (referenced by accident_injury.nature_of_inj).
          accident_value: Human-readable injury-nature description.
          accident_letter: Sub-letter within the code group.
          load_dt: Timestamp when this row was loaded.
      occupation:
        description: Lookup table for accident_injury.occ_code — the occupation of the injured worker.
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key (referenced by accident_injury.occ_code).
          accident_value: Human-readable occupation description.
          accident_letter: Sub-letter within the code group.
          load_dt: Timestamp when this row was loaded.
      body_part:
        description: Lookup table for accident_injury.part_of_body — which body part was injured (e.g., hand, head, back, eye).
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key (referenced by accident_injury.part_of_body).
          accident_value: Human-readable body-part description.
          accident_letter: Sub-letter within the code group.
          load_dt: Timestamp when this row was loaded.
      injury_source:
        description: Lookup table for accident_injury.src_of_injury — the source object or substance that caused the injury (e.g., ladder, vehicle, chemical, machinery).
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key (referenced by accident_injury.src_of_injury).
          accident_value: Human-readable injury-source description.
          accident_letter: Sub-letter within the code group.
          load_dt: Timestamp when this row was loaded.
      degree_injury:
        description: Lookup table for accident_injury.degree_of_inj — the severity of the injury (fatality, hospitalized, non-hospitalized lost-time, first aid, etc.).
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key (referenced by accident_injury.degree_of_inj).
          accident_value: Human-readable severity description.
          accident_letter: Sub-letter within the code group.
          load_dt: Timestamp when this row was loaded.
      task:
        description: Lookup table for accident_injury.task_assigned — the task the worker was assigned to perform when injured.
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key (referenced by accident_injury.task_assigned).
          accident_value: Human-readable task description.
          accident_letter: Sub-letter within the code group.
          load_dt: Timestamp when this row was loaded.
      project_type:
        description: Lookup table for accident.project_type — for construction accidents, the type of project (new construction, alteration, demolition, etc.).
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key.
          accident_value: Human-readable project-type description.
          accident_letter: Letter key (referenced by accident.project_type).
          load_dt: Timestamp when this row was loaded.
      end_use:
        description: Lookup table for accident.const_end_use — for construction accidents, the end use of the building or facility being constructed (residential, commercial, industrial, highway, etc.).
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key.
          accident_value: Human-readable end-use description.
          accident_letter: Letter key (referenced by accident.const_end_use).
          load_dt: Timestamp when this row was loaded.
      cost:
        description: Lookup table for accident.project_cost — for construction accidents, the cost bracket of the construction project (e.g., under $50k, $50k-$250k, etc.).
        columns:
          accident_code: OSHA-170 form code group.
          accident_number: Code key.
          accident_value: Human-readable cost-bracket description.
          accident_letter: Letter key (referenced by accident.project_cost).
          load_dt: Timestamp when this row was loaded.
