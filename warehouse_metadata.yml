    source_description: Closed-case records from the NLRB's Case Activity Tracking System (CATS), released as public files through data.gov.
    source_license: https://creativecommons.org/publicdomain/mark/1.0/
    code_repository: https://github.com/labordata/nlrb-cats
    source_organization:
      "@type": Organization
      name: National Labor Relations Board
      url: https://www.nlrb.gov/
