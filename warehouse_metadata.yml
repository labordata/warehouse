  chips:
    title: NLRB CHIPS data, 1963-2000
    source: NLRB files archived with the National Archive
    source_url: https://github.com/labordata/CHIPS
    description_html: |-
      <p>The NLRB's <strong>Case Handling Information Processing System (CHIPS)</strong> — the agency's case-management database from the 1960s through 2000, when it was replaced by what became the <a href="./cats">cats</a> system (1999-2011) and then by the current online case system (2010+ , see <a href="./nlrb">nlrb</a>).</p>
      <p>Covers two case families:</p>
      <ul>
        <li><strong>C-cases</strong> (unfair labor practice charges) — keyed by <code>case_number</code> in <a href="./chips/c_master">c_master</a>, with names and addresses in <a href="./chips/c_names">c_names</a> / <a href="./chips/c_address">c_address</a> and procedural milestones in <a href="./chips/c_formal1">c_formal1</a> through <a href="./chips/c_formal4">c_formal4</a>. The CHIPS C-cases run 1963 through 2000.</li>
        <li><strong>R-cases</strong> (representation petitions) — keyed by <code>case_number</code> in <a href="./chips/r_master">r_master</a>, with election outcomes in <a href="./chips/rc_elect">rc_elect</a> (75,894 elections) and union-deauthorization elections in <a href="./chips/ud_elect">ud_elect</a> (1,427 cases). The R-cases run 1969 through 2000.</li>
      </ul>
      <p>The data is sourced from NLRB files preserved by the National Archives. Sean Brailey transcribed the county table and other lookup tables from the official <a href="https://s3.amazonaws.com/NARAprodstorage/opastorage/live/1/8902/890201/content/arcmedia/electronic-records/rg-025/chips/113.1CL.pdf">CHIPS codebook (PDF)</a>, which remains the authoritative reference for the many short-coded fields (case-type codes, transaction codes, disposition stages, union-type codes, etc.). Code-expansion lookup tables are prefixed <code>l_</code>.</p>
      <p><strong>Note on column documentation:</strong> Plain-English descriptions of well-known fields (case numbers, dates, vote counts, union names, case-type codes) are reliable. Descriptions of internal NLRB-procedural fields (<code>method_disposition</code>, <code>formal_action_control</code>, <code>solic_stages_investig</code>, <code>card_control</code>, <code>chips_amended_code</code>, <code>action_777</code>, <code>patric_union</code>, and similar machine-control / stage / control-code fields) are inferred from column names and general NLRB process knowledge</p>
    temporal_coverage: "1963/2000"
    source_organization:
      "@type": GovernmentOrganization
      name: National Labor Relations Board
      url: https://www.nlrb.gov/
    keywords:
      - NLRB
      - CHIPS
      - unfair labor practices
      - representation elections
      - decertification
      - historical labor data
      - National Archives
    tables:
      c_master:
        description: One row per unfair-labor-practice (C) case. 516,355 rows spanning 1963-2000. Hub of the C-case schema, keyed by case_number; other c_* tables foreign-key here. Charges include CA (against employer), CB (against union), CC (secondary), CD (jurisdictional), CG (union duty-of-fair-representation), and CP (picketing).
        columns:
          case_number: Composite NLRB case identifier (region-type-docket-suffix combined). Primary key.
          region: NLRB regional office (1-32).
          ctype: Case-type code. FK to l_case_types.
          docket: Docket number within the region.
          suffix: Sub-docket suffix (typically 0 for original, higher for consolidations).
          file_date: Date the charge was filed (ISO 8601, YYYY-MM-DD).
          close_date: Date the case was administratively closed.
          date_last_action: Date of the most recent recorded action.
          county: County code where the alleged conduct occurred. FK to l_county.
          state: State code. FK to l_state_codes.
          industry: SIC industry code or descriptive industry text.
          complainant: Charging party (the union or worker filing the charge). FK to l_union_codes_and_names when the complainant is a coded union.
          joint_complainant: Second complainant code, when more than one party joined the charge.
          respondent: Charged party (the employer or union being accused).
          joint_respondent: Second respondent, when more than one party was charged.
          number_employed: Number of employees at the establishment.
          allegations: Allegation code(s) — see allegations table for the code/text mapping.
          number_discrim: Number of employees alleged to have been discriminated against.
          situation: Procedural situation code.
          number_of_charges: Count of charges within this case file.
          type_charge: Free-text or coded charge type.
          number_allegations: Count of allegations across charges.
          status: Case status indicator.
          formal_action_control: Control code for formal-action stage.
          machine_control: Internal CHIPS control code.
          proceeding_control: Control code for the proceeding state.
          fact_advice: Indicator for whether advice was sought from the General Counsel's Office.
          type_refusal: Type of refusal-to-bargain, when applicable (mostly relevant to 8(a)(5) cases).
          fact_appeal: Indicator for whether an appeal was filed.
          code_date_ro_disp: Code for the date of the Regional Office disposition.
          date_ro_disp: Date the Regional Office issued its disposition.
          method_disposition: Method of disposition code.
          collyer_deferral: Whether the case was deferred under the Collyer doctrine (arbitration deferral).
          date_collyer_began: Date Collyer deferral began.
          date_collyer_end: Date Collyer deferral ended.
          code_date_closed: Code for the closing date.
          stage_close: Stage at which the case closed.
          method_close: Method of closing. FK to l_c_case_closing.
          reason_remedy_close: Reason or remedy at closing.
          status_barg_close: Bargaining-status indicator at closing.
          solic_stages_investig: Solicitor's stages of investigation indicator.
          contact_witness: Witness-contact indicator.
          date_re_advice_received: Date a response to advice was received.
          date_action_on_advice: Date action was taken on advice.
          date_appeal_received: Date an appeal was received.
          date_action_on_appeal: Date action was taken on the appeal.
          hearing_held_code: Code indicating whether a hearing was held.
          decision_made_code: Code indicating whether a decision was made.
          chips_close_flag: CHIPS-internal close flag.
          chips_close_date: CHIPS-internal close date.
          related_case: Related case-number reference.
          chips_amended_code: CHIPS-internal amendment code.
          formal_setl: Indicator for formal settlement.
          filed_calendar_year: Calendar year the charge was filed.
          closed_calendar_year: Calendar year the case closed.
          filed_fiscal_year: Federal fiscal year filed (October-September).
          closed_fiscal_year: Federal fiscal year closed.
          key_case_number: Lead case number when consolidated.
          sub_key_case_number: Sub-case number when consolidated.
          transferred_case_number: Case number to which the file was transferred, when applicable.
      r_master:
        description: One row per representation (R) case. 111,291 rows spanning 1969-2000. Hub of the R-case schema. Includes petitions for certification (RC), decertification (RD), and employer-filed (RM); also UD (union deauthorization) and UC (unit clarification) cases.
        columns:
          case_number: Composite NLRB case identifier. Primary key.
          region: NLRB regional office. FK to regions.region_num.
          ctype: Case-type code. FK to l_case_types.
          docket: Docket number within region.
          file_date: Date the petition was filed (ISO 8601, YYYY-MM-DD).
          close_date: Date the case closed.
          date_last_action: Date of the most recent recorded action.
          industry: Industry code or descriptive text.
          state: State code. FK to l_state_codes.
          county: County code. FK to l_county.
          petitioner_type: Type of petitioning party (individual, union, employer).
          petitioner: Petitioner identifier. FK to l_union_codes_and_names when the petitioner is a coded union.
          joint_petitioner: Second petitioner, when more than one filed.
          local_number: Local-union number of the petitioner.
          recogn_union_type: Type of currently-recognized union, when applicable (relevant to RD/RM cases).
          recogn_union: Code for the recognized union. FK to l_union_codes_and_names.
          joint_recogn_union: Second recognized union.
          unit: Bargaining-unit type code. FK to l_unit_codes.
          number_emp: Number of employees in the bargaining unit.
          proposed_no_emp: Proposed number of employees in the unit.
          picket_8b7c: Whether the case involves 8(b)(7)(C) picketing.
          status: Case status indicator.
          machine_control: Internal CHIPS control code.
          proceeding_control: Control code for the proceeding state.
          date_appeal: Date of an appeal, when applicable.
          ruling_code: Code for the ruling on appeal.
          consol_code: Consolidation code.
          date_notice_hearing_issued: Date the hearing notice was issued.
          date_hearing_opened: Date the hearing opened.
          date_hearing_closed: Date the hearing closed.
          hearing_control: Hearing control code.
          code_date_closed: Code for the closing date.
          stage_closed: Stage at which the case closed.
          method_closed: Method of closing.
          reason_close: Reason for closing.
          hearing_held_code: Code indicating whether a hearing was held.
          dec_made_code: Code indicating whether a decision was made.
          date_agree_approv: Date an agreement was approved.
          date_appea_recd: Date an appeal was received.
          date_action_on_appeal: Date action was taken on the appeal.
          chips_amended_code: CHIPS-internal amendment code.
          date_hearing2_open_108: Date a second hearing under Section 10(8) opened.
          date_hearing2_closed_108: Date the second hearing under Section 10(8) closed.
          blocking_case_code: Code indicating a blocking-case relationship.
          consol_sever: Consolidation/severance indicator.
          case_stage_action: Stage of the case action.
          consol_type: Consolidation type.
          chips_close_flag: CHIPS-internal close flag.
          chips_close_date: CHIPS-internal close date.
          filed_calendar_year: Calendar year the petition was filed.
          closed_calendar_year: Calendar year the case closed.
          filed_fiscal_year: Federal fiscal year filed.
          closed_fiscal_year: Federal fiscal year closed.
          blocking_case_number: Case number of any blocking case.
          consol_case_number: Lead case number when consolidated.
          sub_consol_case_number: Sub-case number when consolidated.
          transfer_case_number: Case number of any transferred case.
      rc_elect:
        description: One row per representation-case election held under CHIPS (75,894 elections, 1969-2000). Captures the union(s) on the ballot, vote totals, challenges, and the outcome. Up to four "losing" unions are tracked alongside the winner, supporting multi-union elections.
        columns:
          case_number: Foreign key to r_master.case_number.
          suffix: Election suffix (for re-runs or runoffs within a case).
          election_date: Date of the election (ISO 8601, YYYY-MM-DD).
          unit: Bargaining-unit type code. FK to l_unit_codes.
          description_election: Free-text description of the election.
          expedited: Indicator for an expedited election (1 if expedited).
          date_election_held: Date the election actually took place.
          type_election: Type of election (board-ordered, consent, stipulated, etc.). FK to l_type_elections.
          no_elig: Number of eligible voters.
          join_union_won: Joint indicator for the winning union (if more than one union jointly won).
          union_won_votes: Votes received by the winning union.
          union_won_intl_type: Type code for the winning international union. FK to l_elect_union_type.
          union_won_intl: International code for the winning union. FK to l_union_codes_and_names.
          joint_union_lost_1: Joint indicator for losing union slot 1.
          union_lost_votes_1: Votes received by losing union 1.
          union_lost_intl_1_type: Type code for losing union 1's international.
          union_lost_intl_1: International code for losing union 1.
          joint_union_lost_2: Joint indicator for losing union slot 2.
          union_lost_votes_2: Votes received by losing union 2.
          union_lost_intl_2_type: Type code for losing union 2's international.
          union_lost_intl_2: International code for losing union 2.
          joint_union_lost_3: Joint indicator for losing union slot 3.
          union_lost_votes_3: Votes received by losing union 3.
          union_lost_intl_3_type: Type code for losing union 3's international.
          union_lost_intl_3: International code for losing union 3.
          joint_union_lost_4: Joint indicator for losing union slot 4.
          union_lost_votes_4: Votes received by losing union 4.
          union_lost_intl_4_type: Type code for losing union 4's international.
          union_lost_intl_4: International code for losing union 4.
          votes_against_union: Votes against representation ("no union").
          challenges: Number of challenged ballots.
          void_votes: Number of void ballots.
          elect_vote_control: Election-vote control code.
          control: Election control code.
          conclusive: Conclusive-election indicator. FK to l_elect_conclusive.
          challenges_determinative: Indicator that challenged ballots are determinative of the outcome.
          patric_union: Participating-union code. FK to l_elect_participating_union.
          incumb_union: Incumbent-union indicator. FK to l_elect_incumbent_union.
          mail_ballot: Indicator for mail-ballot election.
          union_control: Union-side control code.
          cross_petition: Indicator that a cross-petition was filed.
          runoff_necessary: Indicator that a runoff election was needed.
          cross_pet_case_number: Case number of any cross-petition.
          rerun_runoff_number: Number identifying re-runs or runoffs.
          impounded: Indicator that ballots were impounded.
          date_elect_certified: Date the election was certified.
          stage: Stage of the election proceedings. FK to l_elect_stage_of_closing.
          method: Method of disposition. FK to l_elect_method_of_disposition.
        units:
          no_elig: persons
          union_won_votes: votes
          union_lost_votes_1: votes
          union_lost_votes_2: votes
          union_lost_votes_3: votes
          union_lost_votes_4: votes
          votes_against_union: votes
          challenges: ballots
          void_votes: ballots
      ud_elect:
        description: One row per union-deauthorization (UD) election. 1,427 elections, 1969-2000. UD cases ask whether to remove a union's right to enter into union-security agreements (NLRA Section 9(e)(1)). Smaller universe than rc_elect because UD elections are relatively rare.
        columns:
          case_number: Foreign key to r_master.case_number.
          suffix: Election suffix (for re-runs).
          election_date: Date of the election.
          cunion: Currently-recognized union code.
          description_election: Free-text description.
          expedited: Expedited-election indicator.
          unit: Bargaining-unit type.
          date_election_held: Date the election took place.
          type_election: Type code.
          no_elig: Eligible voters.
          v_votes: Total votes cast.
          for_prop: Votes in favor of the deauthorization proposition.
          agn_prop: Votes against the proposition.
          chall: Challenged ballots.
          void: Void ballots.
          cout: Count control code.
          control: Election control.
          date_election_certified: Date the election was certified.
          stage: Stage of the proceedings.
          method: Method of disposition.
          mail_ballot: Mail-ballot indicator.
          cross_pet_region: Cross-petition region, when applicable.
          cross_pet_type: Cross-petition case type.
          cross_pet_docket: Cross-petition docket number.
          cross_pet_suffix: Cross-petition suffix.
          rerun_runoff_number: Re-run/runoff identifier.
          impounded: Ballots-impounded indicator.
        units:
          no_elig: persons
          v_votes: votes
          for_prop: votes
          agn_prop: votes
          chall: ballots
          void: ballots
      allegations:
        description: Allegation-code lookup. Each row maps an allegation code (within a case type) to its descriptive text. 64 rows.
        columns:
          ctype: Case-type code the allegation applies to.
          code: Allegation code.
          allegations: Text of the allegation.
      regions:
        description: NLRB regional-office lookup. 35 rows, covering the agency's regional, sub-regional, and resident-office structure.
        columns:
          region_num: Regional office number. Primary key reference.
          district_num_fk: Parent district number.
          region_name: Regional office name.
          subregion_flag: Indicator distinguishing main regions from sub-regions.
          belongs_to_region: Parent region number, when this is a sub-region or resident office.
      c_names:
        description: Names associated with each C-case — typically the complainant, the respondent (employer or union), and any other named parties.
        columns:
          case_number: Foreign key to c_master.case_number.
          name: Party name.
      c_address:
        description: Addresses associated with each C-case.
        columns:
          case_number: Foreign key to c_master.case_number.
          address: Street address.
          city: City.
          state_alpha: Two-letter state abbreviation.
          state_numeric: Numeric state code (FK to l_state_codes).
      c_formal1:
        description: First procedural-formal-action stage for C-cases — typically the complaint-issuance stage.
        columns:
          case_number: Foreign key to c_master.case_number.
          cf1_date: Stage date.
          date_last_action: Date of last action at this stage.
          consol_type: Consolidation type.
          consol_code: Consolidation code.
          update_control: Update control flag.
          code_date_complt_iss: Code for date complaint issued.
          date_complaint_issued: Date the formal complaint was issued.
          allegations: Allegations at this stage.
          number_discrim: Number of employees alleged to have been discriminated against.
          complaint_control: Complaint control code.
          code_date_ro_disp: Code for the Regional Office disposition date.
          date_ro_disp: Regional Office disposition date.
          ro_disp_control: Regional Office disposition control code.
          date_hearing_opened: Date a hearing was opened at this stage.
          code_date_hearing_closed: Code for the hearing-close date.
          date_hearing_closed: Date the hearing closed.
          hearing_control: Hearing control code.
          code_date_disp_issed_recd: Code for the date the disposition was issued/received.
          date_disp_issued_recd: Date the disposition was issued or received.
          type_disposition: Type of disposition.
          allegations_uphld: Count of allegations upheld.
          allegations_dismd: Count of allegations dismissed.
          discrim_upheld: Count of discrimination claims upheld.
          discrim_dismissed: Count of discrimination claims dismissed.
          back_pay_control: Back-pay control code.
