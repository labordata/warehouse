title: Labor Data
description_html: |-
  <p>Databases related to the US labor movement collected from government sources.</p>
databases:
  nlrb:
    title: NLRB cases since 2010
    source: National Labor Relations Board website, scraped
    source_description: Case records for representation and unfair-labor-practice proceedings, published through the National Labor Relations Board's public case search.
    source_license: https://creativecommons.org/publicdomain/mark/1.0/
    source_url: https://www.nlrb.gov/search/case
    code_repository: https://github.com/labordata/nlrb-data
    description_html: |-
      <p>National Labor Relations Board case data from the NLRB's current online case management system. Covers union-representation cases (R petitions — RC certification, RD decertification, RM employer-filed) and unfair-labor-practice cases (C charges — CA against employers, CB against unions, and several less-common subtypes), plus unit-clarification, deauthorization, and related case types.</p>
      <p>The data is organized around a central <a href="./nlrb/filing">filing</a> table (one row per case) with related tables for <a href="./nlrb/participant">participants</a>, <a href="./nlrb/allegation">allegations</a>, <a href="./nlrb/sought_unit">bargaining units sought</a>, <a href="./nlrb/voting_unit">units that voted</a>, <a href="./nlrb/election">elections</a>, <a href="./nlrb/election_result">election results</a>, <a href="./nlrb/tally">tallies</a>, <a href="./nlrb/docket">docket events</a>, and <a href="./nlrb/document">case documents</a>. All linked by <code>case_number</code>.</p>
    temporal_coverage: "2010/.."
    source_organization:
      "@type": Organization
      name: National Labor Relations Board
      url: https://www.nlrb.gov/
    keywords:
      - NLRB
      - union elections
      - representation elections
      - unfair labor practices
      - ULP charges
      - decertification
      - certification
      - bargaining units
      - labor disputes
    tables:
      filing:
        description: One row per NLRB case, identified by case_number. The hub of the schema — all other tables reference filing via case_number. Common case types include CA (charges against employers), CB (charges against unions), RC (certification petitions), RD (decertification petitions), and RM (employer-filed representation), along with smaller categories CC, CD, CE, CG, CP, UC, UD, AC, and WH.
        columns:
          case_number: NLRB case identifier. Format is <region>-<type>-<sequence>, e.g. "01-RC-123456". Primary key.
          name: Case name (typically the employer or charged party).
          case_type: Two-letter case-type code. R-series are representation cases (RC, RD, RM); C-series are unfair-labor-practice charges (CA, CB, CC, CD, CE, CG, CP); others include UC (unit clarification), UD (union-shop deauthorization), AC (amendment of certification), and WH (workers under WH-prefixed administrative cases).
          url: Public URL of the case on nlrb.gov.
          city: City of the establishment or unit involved.
          state: Two-letter US Postal Service state abbreviation.
          date_filed: Date the petition or charge was filed (ISO 8601, YYYY-MM-DD).
          region_assigned: NLRB regional office handling the case (two-digit region code, sometimes with a sub-region letter).
          status: Case status — "Closed", "Open", "Open - Blocked" (paused pending another case), or "Inactive".
          date_closed: Date the case was administratively closed (blank for open cases).
          reason_closed: Standard NLRB closing disposition (e.g. "Certification of Representative", "Withdrawal Non-adjusted", "Dismissal Adjusted", "Administrative Closing").
          number_of_eligible_voters: For election cases, the number of voters eligible to participate in the election.
          number_of_voters_on_petition_or_charge: For petitions and charges, the number of workers identified on the filing.
          certified_representative: Name of the certified union, when the case ended in certification.
          created_at: Timestamp when this row was first scraped into the database.
          updated_at: Timestamp when this row was last updated by the scraper.
          last_checked_at: Timestamp of the most recent scrape check against nlrb.gov.
      docket:
        description: One row per docket-system event for a case — every filing, ruling, order, or document logged on the case's NLRB docket.
        columns:
          case_number: Foreign key to filing.case_number.
          date: Date of the docket event (ISO 8601, YYYY-MM-DD).
          document: Name or short description of the document or event.
          actor: Party that performed the action or filed the document.
          url: URL to the document on nlrb.gov, when available.
          created_at: Timestamp when this row was first scraped.
      filing_group:
        description: Groups consolidated cases. When the NLRB combines multiple related cases for handling, this table records the relationship — each row pairs a case_number with its root_case_number (the primary case in the group).
        columns:
          root_case_number: The primary case in a group of consolidated cases.
          case_number: A case in the group. Foreign key to filing.case_number; primary key in this table (each case belongs to at most one group).
          created_at: Scrape timestamp.
          updated_at: Last-update timestamp.
      participant:
        description: Parties to each case — petitioners, charged parties, employers, unions, intervenors, and their legal representatives. Many cases have multiple participants. Note that the subtype column is partially polluted by upstream data quality issues (some rows contain street addresses where a subtype code is expected).
        columns:
          case_number: Foreign key to filing.case_number.
          participant: Name of the party (organization or individual).
          type: Role in the case — "Petitioner", "Employer", "Intervenor", "Union Involved", "Charging Party", "Involved Party", "Charged Party", "Charged Party / Respondent", or "Not Specified".
          subtype: Party subtype — "Union", "Employer", "Union as an Employer", "Individual", "Legal Representative", "Additional Service", "Notification", or "Not Specified". Subject to upstream data-quality issues; some rows contain address text instead of a valid subtype.
          address: Mailing address of the participant.
          address_1: Address line 1, when split.
          address_2: Address line 2, when split.
          city: City.
          state: Two-letter US Postal Service state abbreviation.
          zip: ZIP code.
          phone_number: Phone number, when available.
          created_at: Scrape timestamp.
      allegation:
        description: One row per allegation listed in an unfair-labor-practice charge. C-series cases (CA, CB, etc.) typically include one or more allegations citing specific NLRA section violations (e.g. "8(a)(1) — Coercive Statements", "8(a)(3) — Discharge").
        columns:
          case_number: Foreign key to filing.case_number.
          allegation: Text of the allegation as recorded by the NLRB, typically citing an NLRA section subdivision.
          created_at: Scrape timestamp.
      sought_unit:
        description: Bargaining units described in a representation petition — the unit the petitioner wants the NLRB to recognize. Unit-sought descriptions may differ from the unit that actually voted (see voting_unit), since the parties or the NLRB may modify the unit during pre-election proceedings.
        columns:
          case_number: Foreign key to filing.case_number.
          unit_sought: Free-text description of the bargaining unit being petitioned for, generally listing job classifications included and excluded.
          created_at: Scrape timestamp.
      voting_unit:
        description: Bargaining units that actually voted in an NLRB representation election. Each voting_unit gets a synthetic voting_unit_id and may be linked to one or more elections.
        columns:
          voting_unit_id: Synthetic auto-increment identifier for this voting unit.
          case_number: Foreign key to filing.case_number.
          unit_id: Original NLRB unit identifier for the voting unit within the case.
          description: Free-text description of the bargaining unit that voted.
          created_at: Scrape timestamp.
      election:
        description: One row per NLRB election event. An election is identified by case_number + voting_unit_id + date + ballot_type + tally_type — a single case can produce more than one election (e.g. a runoff or a re-run after objections).
        columns:
          election_id: Synthetic auto-increment identifier for this election.
          case_number: Foreign key to filing.case_number.
          voting_unit_id: Foreign key to voting_unit.voting_unit_id.
          date: Date the election was held (ISO 8601, YYYY-MM-DD).
          tally_type: NLRB tally-type designation (e.g. initial, re-run, runoff).
          ballot_type: Whether ballots were manual, mail, mixed, or another mode.
          unit_size: Number of workers in the voting unit at the time of the election.
          created_at: Scrape timestamp.
      election_mode:
        description: Detailed election-mode records sourced from a separate FOIA request to the NLRB (not from the public case scrape that populates the rest of this database). Adds mode-specific timing fields (when ballots were mailed, when they were counted) and per-ballot-choice vote totals beyond what the public website exposes. Coverage is limited to the period covered by the FOIA release.
        columns:
          election_id: Foreign key to election.election_id.
          case_number: Foreign key to filing.case_number.
          name: Case name, denormalized from filing.
          city: City, denormalized.
          state: State, denormalized.
          status: Case status, denormalized.
          date_filed: Petition filing date, denormalized.
          date_closed: Case closure date, denormalized.
          reason_closed: Closing disposition, denormalized.
          election_mode: How the election was conducted (manual, mail, mixed, etc.).
          date_ballot_mailed: For mail-ballot elections, the date ballots were mailed to voters.
          date_ballot_counted: Date the ballots were counted.
          date_election_scheduled: Originally-scheduled election date.
          date_tally_scheduled: Originally-scheduled tally date.
          date_tallied: Date the votes were actually tallied.
          tally_type: NLRB tally-type designation.
          ballot_type: Ballot type.
          unit_id: Original NLRB unit identifier.
          ballots_impounded: Whether ballots were impounded (yes/no text).
          number_of_eligible_voters: Eligible voters in the election.
          number_of_void_ballots: Ballots marked void.
          labor_organization_1_name: Name of the first union on the ballot.
          votes_for_labor_organization_1: Votes received by the first union.
          labor_organization_2_name: Name of the second union on the ballot (multi-union elections).
          votes_for_labor_organization_2: Votes received by the second union.
          labor_organization_3_name: Name of the third union on the ballot.
          votes_for_labor_organization_3: Votes received by the third union.
          votes_cast_against_labor_org: Votes against representation ("no union").
          number_of_valid_votes_counted: Total valid votes counted.
          number_of_challenged_ballots: Challenged ballots (resolved post-election).
          challenges_are_determinative: Whether the challenged ballots are determinative of the outcome (yes/no).
          runoff_required: Whether a runoff election is required (yes/no).
          union_to_certify: Name of the union to be certified, if any.
          unit_involved_in_petition: Description of the unit involved.
          bargaining_unit_determined: Description of the unit ultimately determined.
      election_result:
        description: Summary results for each NLRB election. One row per election, linked by election_id. The per-choice vote breakdown is in tally.
        columns:
          election_id: Primary key. Foreign key to election.election_id.
          total_ballots_counted: Total ballots counted in the election.
          void_ballots: Number of void ballots.
          challenged_ballots: Number of challenged ballots.
          challenges_are_determinative: Whether the challenged ballots could change the outcome (yes/no).
          runoff_required: Whether a runoff election is required (yes/no).
          union_to_certify: Name of the union to be certified, if the election produced certification.
          created_at: Scrape timestamp.
      tally:
        description: Per-ballot-option vote count for each election — one row per option per election. Options include each union on the ballot and "No union".
        columns:
          election_id: Foreign key to election.election_id.
          option: Ballot option name — typically a union name, or "No union" for the no-representation choice.
          votes: Number of votes the option received.
          created_at: Scrape timestamp.
        units:
          votes: votes
      document:
        description: Documents attached to NLRB cases — orders, decisions, hearing transcripts, etc. The current data captures roughly 8,000 documents across cases; coverage is incomplete relative to docket events.
        columns:
          case_number: Foreign key to filing.case_number.
          document: Name or short description of the document.
          url: URL to the document on nlrb.gov.
          created_at: Scrape timestamp.
  f7:
    title: Collective Bargaining Notice (F-7) Data since 1997
    description: Notices to Mediation Agencies (Form F-7) filed with the Federal Mediation and Conciliation Service. Under Section 8(d) of the National Labor Relations Act, parties to an expiring private-sector collective-bargaining agreement must notify FMCS at least 30 days before expiration (60 days for healthcare establishments). Each row is one notice — an advance signal of bargaining activity.
    source: Federal Mediation and Conciliation Service, scraped
    source_description: Notices to mediation agencies (Form F-7) reporting bargaining disputes and contract expirations, published by the Federal Mediation and Conciliation Service.
    source_license: https://creativecommons.org/publicdomain/mark/1.0/
    source_url: "https://www.fmcs.gov/resources/documents-and-data/#tab-d3d7f5344cef9bab4d3"
    code_repository: https://github.com/labordata/fmcs-f7
    description_html: |-
      <p>Notices to Mediation Agencies (<a href="https://www.fmcs.gov/resources/documents-and-data/#tab-d3d7f5344cef9bab4d3">Form F-7</a>) filed with the Federal Mediation and Conciliation Service. Under <a href="https://www.law.cornell.edu/uscode/text/29/158">Section 8(d) of the National Labor Relations Act</a>, parties to an expiring private-sector collective-bargaining agreement must notify FMCS at least 30 days before the contract ends (60 days for healthcare establishments); newly-formed bargaining relationships also file an Initial Contract notice. Each row is one notice — naming the employer, the union, the bargaining unit's affected location and size, the industry (NAICS), and the type of notice (Renegotiation, Reopener, Initial Contract, etc.).</p>
      <p>Data scraped nightly from the FMCS website. FMCS itself only refreshes its data monthly, so a 1–4 week lag is expected. Some legacy rows have unreliable date fields — see column descriptions.</p>
    temporal_coverage: "1997/.."
    source_organization:
      "@type": Organization
      name: Federal Mediation and Conciliation Service
      url: https://www.fmcs.gov/
    keywords:
      - collective bargaining
      - bargaining notices
      - FMCS
      - F-7
      - NLRA Section 8(d)
      - contract expiration
    tables:
      f7:
        description: One row per F-7 notice filed with FMCS since 1997. Most rows are Renegotiation (advance notice of an existing contract's expiration); smaller shares are Reopener, Initial Contract, and other categories. Notices have been filed by either the employer or the union, indicated in notice_submitted_by.
        columns:
          notice_date: Notice date as reported by FMCS. (ISO 8601, YYYY-MM-DD)
          initiated_date: Date the F-7 notice was created in the FMCS system (ISO 8601, YYYY-MM-DD). 
          employer: Employer name as reported on the notice.
          employer_street: Employer street address.
          employer_city: Employer city.
          employer_state: Employer state (two-letter US postal abbreviation or full name; format varies).
          employer_zip: Employer ZIP code. 
          employer_representative: Name of the employer's designated contact for bargaining.
          employer_representative_phone: Phone number for the employer representative.
          employer_representative_title: Job title of the employer representative.
          employer_representative_email: Email address of the employer representative.
          union_name: Full name of the union, typically including parent affiliation and local number.
          union_street: Union mailing address.
          union_city: Union city.
          union_state: Union state.
          union_zip: Union ZIP code.
          union_representative: Name of the union's designated contact for bargaining.
          union_representative_phone: Phone number for the union representative.
          union_representative_title: Job title of the union representative (e.g. "Business Manager", "President").
          union_representative_email: Email address of the union representative.
          affected_location_city: City where the bargaining-unit workers are employed (may differ from employer's headquarters city).
          affected_location_state: State where the bargaining-unit workers are employed.
          affected_location_zip: ZIP code where the bargaining-unit workers are employed.
          expiration_date: Expiration date of the contract being renegotiated. (ISO 8601, YYYY-MM-DD)
          naics: NAICS industry code for the employer (2- to 6-digit, depending on what FMCS captured).
          industry: Human-readable industry name corresponding to the NAICS code.
          bargaining_unit_size: Number of workers in the bargaining unit (the group covered by the collective-bargaining agreement).
          establishment_size: Total number of employees at the establishment (typically larger than bargaining_unit_size).
          notice_submitted_by: Who filed the notice — typically "F-7 from Employer" or "F-7 from Union".
          category: Type of notice. Common values are "Renegotiation" (advance notice of an existing contract's expiration), "Reopener" (mid-term reopening provision triggered), and "Initial Contract" (newly-formed bargaining relationship). Less common categories include "I & I" (an FMCS internal service-type code, expansion not publicly documented), "Unspecified", "Employment Mediation", "Regulatory Negotiation", "Facilitate a Meeting", and "Dispute Systems Design".
          healthcare_related: Boolean flag (0 or 1) indicating whether the employer is a healthcare establishment subject to the 60-day NLRA Section 8(d)(A) notice requirement.
          location_negotiation_city: City where bargaining will take place, when supplied.
          location_negotiation_state: State where bargaining will take place, when supplied.
          location_negotiation_zip: ZIP code where bargaining will take place, when supplied.
        units:
          bargaining_unit_size: persons
          establishment_size: persons
  nlrb_rc_elections_1961_1998:
    title: Results of NLRB union-representation elections, 1965-1998
    description: Historical record of NLRB representation elections from 1965 to 1998, drawn from an internal AFL-CIO database. Each row is one election that was actually held (the dataset does NOT include organizing drives where petitions were withdrawn or dismissed before a vote). Includes the petitioning union, the employer, the bargaining unit, vote totals, and the election outcome.
    description_html: |-
      <p>Election-by-election results for NLRB union-representation cases (RC, RD, and RM petitions) from the mid-1960s through 1998. The data was originally maintained by the AFL-CIO in Washington, DC, then compiled and cleaned by <a href="https://www.gsb.stanford.edu/faculty-research/faculty/john-paul-ferguson">JP Ferguson</a> (now at McGill University) for use in academic research on union organizing.</p>
      <p>Each row is one election that was actually held. Note that the data does NOT include organizing drives where petitions were filed but later withdrawn or dismissed before reaching a vote — for those, a much larger universe of records is needed (see <a href="./cats">cats</a> for the 1999–2011 successor system).</p>
      <p>Many internal NLRB code fields are preserved as-is from the source database; their mappings are not fully documented in the upstream cleaning scripts. The most analytically useful columns are the employer/union names, the vote totals (<code>fst_votes</code>, <code>votes_no</code>, <code>valid_for</code>, <code>valid_cast</code>), the bargaining-unit category, the election date, and <code>won</code>.</p>
    source: NLRB representation election results, 1965-1998, compiled by J.P. Ferguson
    source_description: Election-by-election results for NLRB representation cases from 1965 to 1998, compiled and cleaned by J.P. Ferguson for academic research on union organizing.
    source_url: https://github.com/jpfergongithub/nlrb_old_rcases
    temporal_coverage: "1959/1999"
    source_organization:
      "@type": Person
      name: J.P. Ferguson
      url: https://www.gsb.stanford.edu/faculty-research/faculty/john-paul-ferguson
    source_based_on:
      "@type": Dataset
      name: Union representation elections database
      description: An internal database of union representation elections maintained by the AFL-CIO in Washington, D.C.
      creator:
        "@type": Organization
        name: AFL-CIO
        url: https://aflcio.org/
    keywords:
      - NLRB
      - union elections
      - representation elections
      - decertification elections
      - union organizing
      - certification elections
      - historical labor data
    tables:
      nlrb_representation_1961_1998:
        description: One row per NLRB representation election held between roughly 1959 and 1999. Most rows are RC (certification) petitions, with smaller shares of RD (decertification) and RM (employer-filed) cases. Roughly half of elections were won by the petitioning union and half were lost.
        columns:
          nlrb_id: NLRB case identifier.
          region: NLRB regional office, as an integer code (1 through ~32).
          r_type: Petition type — "RC" (representation certification, petitioned by a union seeking recognition), "RD" (decertification, petitioned by workers seeking to remove an existing union), or "RM" (representation by employer, petitioned by an employer presented with a recognition demand).
          docket: Docket number within the regional office.
          sic: 3-digit Standard Industrial Classification code (the pre-NAICS industry coding system).
          unit: Bargaining-unit category. Standard values are "Production", "Clerical", "Craft", "Drivers", "Guard", "Professional", "Departmental", and "Other".
          elect_size: Size of the bargaining unit (number of workers).
          elect_type: NLRB election type code — "R" (stipulated election), "C" (consent election), "E" (expedited), plus less-common "B" and "S" codes whose meanings are not documented in the upstream source.
          elig_voter: Number of eligible voters in the election.
          fst_votes: Votes received by the first union on the ballot.
          fst_union: Name of the first union on the ballot (typically the petitioning union for RC cases).
          sec_votes: Votes received by the second union, in multi-union elections.
          sec_union: Name of the second union on the ballot.
          thr_votes: Votes received by the third union, in three-way elections.
          thr_union: Name of the third union on the ballot.
          votes_no: Votes against representation ("no union").
          challenged: Number of ballots challenged at the polls (challenges resolved after the election).
          elect_contr: Indicator that the election was contested. Coded numerically; mapping not documented.
          objection_filed_date: Date an objection to the election was filed, when applicable.
          obj_party: Numeric code (0–8) for the party that filed the objection. Mapping not documented in upstream source.
          day_obj_el: Two-character internal NLRB code related to the objection filing. Mapping not documented.
          ruling_obj: Numeric code for the ruling on the objection. Mapping not documented.
          day_dec_el: Two-character internal NLRB code related to the decision. Mapping not documented.
          req_review: Indicator for whether a request for review was filed. Stored as a float.
          elect_ctrl: NLRB internal control code; mapping not documented.
          hrngctrl: Hearing control code; mapping not documented.
          day_el_clo: Two-character internal code related to election closing. Mapping not documented.
          stg_closin: Single-character code for the stage at which the case closed. Mapping not documented.
          meth_disp: Method of disposition (numeric code). Mapping not documented.
          participant: Single-character participant code (A, B, C, D, E, G, H, K). Mapping not documented.
          incumb_un: Indicator (0/1) for whether an incumbent union was on the ballot (always 1 for RD petitions).
          recordctrl: Record control code; mapping not documented.
          t_dt_filed: Filing date as it appeared in the source database, before cleaning.
          filed_date: Filing date in cleaned ISO 8601 form (YYYY-MM-DD).
          company: Employer name.
          address: Employer street address.
          pet_union: Name of the petitioning union (for RC and RM cases).
          valid_for: Total valid votes cast in favor of representation (sum across union choices on the ballot).
          valid_cast: Total valid votes cast.
          t_dt_elect: Election date as it appeared in the source database, before cleaning.
          election_date: Election date in cleaned ISO 8601 form (YYYY-MM-DD).
          won: Election outcome for the petitioning union — "Won" or "Lost".
          recodemth: Recoding method used during data preparation (0, 1, or 2). Mapping not documented.
          state: Two-letter US Postal Service state abbreviation.
          gsacty: GSA city code (numeric).
          local: Union local number.
          local_name: Local union name, when supplied.
          mailballot: Whether the election was conducted by mail ballot — "Yes" or "No".
          t_dt_closed: Case closure date as it appeared in the source database, before cleaning.
          closed_date: Case closure date in cleaned ISO 8601 form.
          zip: ZIP code of the employer or election location.
          problem: Data-quality problem flag (all rows are 0 in the current data).
          city_name: City name (typically prefixed with the state abbreviation in the source data).
          county_name: County name.
        units:
          elect_size: persons
          elig_voter: persons
          fst_votes: votes
          sec_votes: votes
          thr_votes: votes
          votes_no: votes
          challenged: ballots
          valid_for: votes
          valid_cast: votes
  cats:
    title: NLRB cases, 1999-2011
