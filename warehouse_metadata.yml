      l_case_party:
        label_column: description
      l_geographic_division: 
        label_column: description
      l_geographic_region:
        label_column: description
      l_labor_org_code:
        label_column: labor_org_name
      l_naics_code:
        label_column: description
      l_naics_sector:
        label_column: description
      l_nlrb_branch:
        label_column: description
      l_nlrb_district:
        label_column: description
      l_nlrb_division:
        label_column: description
      l_nlrb_office:
        label_column: description
      l_nlrb_office_type:
        label_column: description
      l_nlrb_region:
        label_column: description
      l_organization:
